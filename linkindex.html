<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Apertura de Puertas</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}

.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}

h2{
  font-size:4.5rem;
  margin-bottom:1rem;
}

.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}

.fecha-hora-combinada{
  display:grid;
  grid-template-columns: 140px 220px 120px;
  row-gap:0.5rem;
  font-size:2.5rem;
}

.panel{
  border-radius:15px;
  padding:1.5rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.panel.portal{
  background:#e3f5ea;
  border:3px solid #145c2c;
}

.panel.apto{
  background:#e8edff;
  border:3px solid #1a3f9e;
}

.panel.luces{
  background:#fff3e6;
  border:3px solid #b36000;
}

.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}

.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}

button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.btn-abrir{
  background:linear-gradient(to bottom,#1f7a3a,#0f4f23);
}

button:disabled{
  background:#999!important;
  color:#555!important;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="cuadro">

<h2>Apertura de Puertas</h2>

<div class="fecha-hora">
Apartamento:
<span id="apartamento"></span>
<span id="estadoApartamento" style="font-weight:bold;"></span>
</div>

<div class="fecha-hora fecha-hora-combinada">
<span>Inicio:</span>
<span id="fechaInicio"></span>
<span id="horaInicio"></span>

<span>Fin:</span>
<span id="fechaFin"></span>
<span id="horaFin"></span>
</div>

<div class="panel portal">
<div style="font-size:2.5rem;font-weight:bold;">Puerta Portal</div>
<div class="estadoPuerta" id="estadoPortal"></div>
<div class="botones" id="botonesPortal">
  <button id="abrir" class="btn-abrir">Abrir</button>
</div>
</div>

<div class="panel apto">
<div style="font-size:2.5rem;font-weight:bold;">Puerta Apartamento</div>
<div class="estadoPuerta" id="estadoApto"></div>
<div class="botones" id="botonesApto">
  <button id="abrirApto" class="btn-abrir">Abrir</button>
</div>
</div>

<div class="panel luces" id="panelLuces" style="display:none;">
<div style="font-size:2.5rem;font-weight:bold;">Luces</div>
<div class="estadoPuerta" id="estadoLuces"></div>
<div class="botones" id="botonesLuces"></div>
</div>

</div>

<script>
// Parámetros del link
const params = new URLSearchParams(window.location.search);

const k = params.get('k');     
const m = params.get('m');     
const fa = params.get('fa');   
const fe = params.get('fe');   
const he = params.get('he');   
const fs = params.get('fs');   
const hs = params.get('hs');   
const a = Math.min(Math.max(parseInt(params.get('a')),1),100) || 1;
const cp = params.get('cp')==='1'; 
const ca = params.get('ca')==='1'; 
const l = parseInt(params.get('l'))||0; 

// Elementos del DOM
const btnAbrir = document.getElementById('abrir');
const btnAbrirApto = document.getElementById('abrirApto');
const estadoApartamento = document.getElementById('estadoApartamento');
const estadoPortal = document.getElementById('estadoPortal');
const estadoApto = document.getElementById('estadoApto');

const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');
const estadoLuces = document.getElementById('estadoLuces');

// Formateo de fecha y hora
function formatearFechaHora(f,h){
  return {
    fecha: f.slice(0,4)+'-'+f.slice(4,6)+'-'+f.slice(6,8),
    hora: h.slice(0,2)+':'+h.slice(2,4)
  };
}

const inicio = formatearFechaHora(fe, he);
const fin = formatearFechaHora(fs, hs);

// Mostrar datos
document.getElementById('apartamento').textContent = a;
document.getElementById('fechaInicio').textContent = inicio.fecha;
document.getElementById('horaInicio').textContent = inicio.hora;
document.getElementById('fechaFin').textContent = fin.fecha;
document.getElementById('horaFin').textContent = fin.hora;

// Crear botones de luces según L
let botonesLuz = [];
if(l>0){
  panelLuces.style.display = 'block';
  for(let i=1; i<=l; i++){
    const btn = document.createElement('button');
    btn.textContent = 'Punto ' + i;
    btn.classList.add('btn-abrir');
    btn.dataset.num = i;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);
  }
}

// Función de validación
function validarAcceso(){
  const ahora = new Date();
  const fIni = new Date(`${inicio.fecha}T${inicio.hora}:00`);
  const fFin = new Date(`${fin.fecha}T${fin.hora}:00`);
  const acceso = (ahora >= fIni && ahora <= fFin);

  btnAbrir.disabled = !(acceso && cp);
  btnAbrirApto.disabled = !(acceso && ca);

  estadoApartamento.textContent = acceso ? 'Activo' : 'Fuera de horario';
  estadoApartamento.style.color = acceso ? '#0b7a2a' : '#b30000';

  estadoPortal.textContent = (acceso && cp) ? 'ACTIVO' : 'INACTIVO';
  estadoPortal.style.color = (acceso && cp) ? '#0b7a2a' : '#b30000';

  estadoApto.textContent = (acceso && ca) ? 'ACTIVO' : 'INACTIVO';
  estadoApto.style.color = (acceso && ca) ? '#0b7a2a' : '#b30000';

  if(l>0){
    estadoLuces.textContent = acceso ? 'ACTIVO' : 'INACTIVO';
    estadoLuces.style.color = acceso ? '#0b7a2a' : '#b30000';
    botonesLuz.forEach(b => b.disabled = !acceso);
  }
}

validarAcceso();
setInterval(validarAcceso,60000);

</script>

</body>
</html>
