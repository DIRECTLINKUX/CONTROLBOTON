<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada {
  display: flex;
  flex-direction: column;
  font-size: 2rem;
  gap: 0.5rem;
}
.inicioLinea, .finLinea {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
@media (min-width: 480px) {
  .fecha-hora-combinada {
    flex-direction: row;
    justify-content: center;
  }
}
.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line;
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }
</style>
</head>

<body>

<div class="cuadro">

<button id="tituloPrincipal" style="font-size:4.5rem;width:100%;background:linear-gradient(to bottom,#1f7a3a,#0f4f23);color:white;border:none;border-radius:15px;padding:1rem;">
Apertura de Puertas
</button>

<div class="fecha-hora">
Apartamento: <span id="apartamento"></span>
<span id="estadoApartamento" style="font-weight:bold;"></span>
</div>

<div class="fecha-hora fecha-hora-combinada">
  <div class="inicioLinea">
    <span>Inicio:</span>
    <span id="fechaInicio"></span>
    <span id="horaInicio"></span>
  </div>
  <div class="finLinea">
    <span>Fin:</span>
    <span id="fechaFin"></span>
    <span id="horaFin"></span>
  </div>
</div>

<div class="panel portal">
<div class="titulo-panel">Puerta Portal</div>
<div class="estadoPuerta" id="estadoPortal"></div>
<div class="botones">
<button id="abrir" class="verde">Abrir Puerta Portal</button>
</div>
</div>

<div class="panel apto">
<div class="titulo-panel">Puerta Apartamento</div>
<div class="estadoPuerta" id="estadoApto"></div>
<div class="botones">
<button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
</div>
</div>

<div class="panel luces" id="panelLuces" style="display:none;">
<div class="titulo-panel">Luces</div>
<div class="botones" id="botonesLuces"></div>
</div>

<!-- POPUP CONFIGURACIÓN -->
<div id="popupConfig" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">
  <div style="background:white; border-radius:15px; padding:2rem; max-width:600px; width:50%; position:relative;">
  <span id="cerrarPopup" style="
  position:absolute;
  top:1rem;
  right:1rem;
  cursor:pointer;
  font-size:1.4rem;
  background:#b30000;
  color:white;
  padding:0.4rem 1rem;
  border-radius:10px;
  font-weight:bold;
">
Cerrar
</span>
    <h2 style="font-size:1.8rem;">Selección de Tiempo</h2>
    <div id="configBotones" style="margin-top:1rem;"></div>
  </div>
</div>

<!-- POPUP LOG PUERTA -->
<div id="popupLog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
     background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">
  <div style="background:white; border-radius:15px; padding:2rem; max-width:600px; width:50%; position:relative;">
   <span id="cerrarPopupLog" style="
  position:absolute;
  top:1rem;
  right:1rem;
  cursor:pointer;
  font-size:1.4rem;
  background:#b30000;
  color:white;
  padding:0.4rem 1rem;
  border-radius:10px;
  font-weight:bold;
">
Cerrar
</span>
  <h2 style="font-size:1.8rem;" id="tituloLog">Log Puerta</h2>
  <div id="contenidoLog" style="margin-top:1rem; font-size:1.4rem;">Cargando log...</div>
  </div>
</div>

<script>
// -------- DECODIFICAR PARÁMETRO d --------
function base64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length % 4) str += '=';
  return atob(str);
}

const params = new URLSearchParams(window.location.search);
let d = params.get('d') || '';
let decoded = {};

try{
  const d_url = decodeURIComponent(d);
  const base = base64urlDecode(d_url);
  const paramStr = decodeURIComponent(base);
  paramStr.split('&').forEach(p=>{
    const [key,val] = p.split('=');
    decoded[key] = val || '';
  });
  console.log("PARAMS DECODIFICADOS:",decoded);
}catch(e){
  console.error("❌ Error decodificando link:",e);
}

// -------- EXTRAER PARÁMETROS --------
const k   = decoded['k'];
const a   = decoded['a'];
const ct  = decoded['ct'];
const fa  = decoded['fa'];
const fe  = decoded['fe'];
const he  = decoded['he'];
const fs  = decoded['fs'];
const hs  = decoded['hs'];
const cp  = decoded['cp']==='1';
const ca  = decoded['ca']==='1';
const l   = parseInt(decoded['l'])||0;
const ia  = decoded['ia'] || 0;

// NUEVO: extraer m encriptado y pw
const mEncriptado = decoded['m'] || '';
const pw          = decoded['pw'] || '';

// -------- FUNCIONES DESENCRIPTAR Y OBTENER M1 M2 M3 --------
async function aesDecrypt(ciphertext, password) {
    try {
        const bytes  = CryptoJS.AES.decrypt(ciphertext, password);
        const originalText = bytes.toString(CryptoJS.enc.Utf8);
        return originalText;
    } catch(e) {
        console.error("❌ Error desencriptando AES:", e);
        return '';
    }
}

async function obtenerM1M2M3(mEncriptado, pw) {
    if(!mEncriptado || !pw) return [null,null,null];
    try {
        const desEncriptado = await aesDecrypt(mEncriptado, pw);
        const desComprimido = LZString.decompressFromUTF16(desEncriptado);
        const partes = desComprimido.split('|');
        return [
            partes[0] || '',
            partes[1] || '',
            partes[2] || ''
        ];
    } catch(e) {
        console.error('❌ Error al obtener m1,m2,m3:', e);
        return [null,null,null];
    }
}

// -------- RECONSTRUIR MQTT Y BOTONES --------
(async () => {

    let m1,m2,m3;
    [m1,m2,m3] = await obtenerM1M2M3(mEncriptado,pw);

    if(!m1 || !m2 || !m3){
        console.error("❌ No se pudo reconstruir m1, m2, m3. MQTT no se conectará.");
        return;
    }

    m3 = "wss://" + m3 + ".s1.eu.hivemq.cloud:8884/mqtt";

    const client = mqtt.connect(m3,{username: m1,password: m2,connectTimeout: 3000});
    client.on('connect', ()=>console.log("✅ Conectado a HiveMQ Cloud"));
    client.on('error', err=>console.log("❌ Error MQTT:",err));

    // -------- FUNCION ENVIAR MQTT --------
    function enviarMQTT(topic, accion) { 
      if (!ct || ct.trim() === '') {
        console.error("❌ ERROR: CT no está definido. No se puede enviar MQTT.");
        return;
      }
      const ahora = new Date();
      const fechaHoraEnvio = ahora.toISOString();
      if (!topic.startsWith(ct)) {
        const separador = (ct.endsWith('/') || topic.startsWith('/')) ? '' : '/';
        topic = `${ct}${separador}${topic}`;
      }
      let duracion_rele = 0;

      if (topic.includes('/portal')) {
        duracion_rele = parseInt(localStorage.getItem('tiempo_abrir')) || 3;
      } else if (topic.includes('/apto')) {
        duracion_rele = parseInt(localStorage.getItem('tiempo_abrirApto')) || 3;
      } else if (topic.includes('/luz')) {
        const num = topic.match(/luz(\d+)/)[1];
        const minutos = parseInt(localStorage.getItem('tiempo_' + num)) || 60;
        duracion_rele = (minutos === 999999) ? 999999 : minutos * 60;
      }

      const mensaje = {
        id: ahora.getTime(),
        fechaHoraEnvio,
        accion,
        clave: k,
        ct: ct, 
        apartamento: a,
        fechaAlta: fa,
        fechaEntrada: fe,
        horaEntrada: he,
        fechaFin: fs,
        horaFin: hs,
        cp_portal: +cp,
        ca_apto: +ca,
        l_luz: l,
        duracion_rele,
        pw: pw
      };
      console.log(`➡️ MQTT: ${topic}`, mensaje);
      client.publish(topic, JSON.stringify(mensaje), { qos: 1 }, err => {
        if (err) console.log("❌ Error al publicar:", err);
      });
    }

    // -------- BOTONES PRINCIPALES --------
    document.getElementById('abrir').onclick = ()=>enviarMQTT('portal', 'abrir');
    document.getElementById('abrirApto').onclick = ()=>enviarMQTT('apto', 'abrir');

    // -------- CONTROL POPUP CONFIGURACIÓN --------
    const popupConfig = document.getElementById('popupConfig');
    const cerrarPopup = document.getElementById('cerrarPopup');
    cerrarPopup.onclick = ()=>popupConfig.style.display='none';

    // -------- CONTROL POPUP LOG --------
    const popupLog = document.getElementById('popupLog');
    const cerrarPopupLog = document.getElementById('cerrarPopupLog');
    cerrarPopupLog.onclick = ()=>popupLog.style.display='none';

    // -------- PANEL DE LUCES --------
    const panelLuces = document.getElementById('panelLuces');
    const botonesLuces = document.getElementById('botonesLuces');

    if(decoded.luces){
        panelLuces.style.display='block';
        const lucesArray = decoded.luces.split(',');
        lucesArray.forEach((luz,i)=>{
            const btn = document.createElement('button');
            btn.textContent = `Luz ${i+1}`;
            btn.className = 'amarillo';
            btn.onclick = ()=>enviarMQTT('luz'+(i+1),'toggle');
            botonesLuces.appendChild(btn);
        });
    }

    // -------- SUSCRIPCIONES Y RECEPCIÓN DE MENSAJES --------
    client.on('message', (topic,message)=>{
        const msg = message.toString();
        console.log('📩 MQTT Recibido:', topic,msg);
        // TODO: actualizar estado de puertas/luces según msg
    });

})();
</script>

</body>
</html>
