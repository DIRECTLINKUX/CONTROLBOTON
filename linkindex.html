<style>
body{

  display:flex;

.cuadro{

.panel{

}
.titulo-panel{
  font-size:2.5rem;

  padding:0.5rem 0;
  margin-bottom:1rem;

.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }

.botones{

  justify-content:center;
  flex-wrap:wrap;

}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line;
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }

<body>

<!-- POPUP CONFIGURACIÓN -->

">
Cerrar

<!-- POPUP LOG PUERTA -->
<div id="popupLog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
     background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">
  <div style="background:white; border-radius:15px; padding:2rem; max-width:600px; width:50%; position:relative;">
   <span id="cerrarPopupLog" style="
  position:absolute;
  top:1rem;
  right:1rem;
  cursor:pointer;
  font-size:1.4rem;
  background:#b30000;
  color:white;
  padding:0.4rem 1rem;
  border-radius:10px;
  font-weight:bold;
">
Cerrar

</span>
  <h2 style="font-size:1.8rem;" id="tituloLog">Log Puerta</h2>
  <div id="contenidoLog" style="margin-top:1rem; font-size:1.4rem;">Cargando log...</div>
  </div>
</div>

<script>

// -------- DECODIFICAR PARÁMETRO d --------
function base64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length % 4) str += '=';
  return atob(str);
}

const params = new URLSearchParams(window.location.search);
let d = params.get('d') || '';
let decoded = {};

try{
  const d_url = decodeURIComponent(d);
  const base = base64urlDecode(d_url);
  const paramStr = decodeURIComponent(base);
  paramStr.split('&').forEach(p=>{
    const [key,val] = p.split('=');
    decoded[key] = val || '';
  });
  console.log("PARAMS DECODIFICADOS:",decoded);
}catch(e){
  console.error("❌ Error decodificando link:",e);
}

// -------- EXTRAER PARÁMETROS --------
const k   = decoded['k'];
const a   = decoded['a'];
const ct  = decoded['ct'];
const fa  = decoded['fa'];
const fe  = decoded['fe'];
const he  = decoded['he'];
const fs  = decoded['fs'];
const hs  = decoded['hs'];
const cp  = decoded['cp']==='1';
const ca  = decoded['ca']==='1';
const l   = parseInt(decoded['l'])||0;
const ia  = decoded['ia'] || 0;
const mEncriptado  = decoded['m'] || '';
const pw           = decoded['pw'] || '';


// -------- FUNCIONES PARA DESENCRIPTAR Y RECONSTRUIR m1,m2,m3 --------

// Convierte UTF-16 a UTF-8
function utf16ToUtf8(str) {
    return unescape(encodeURIComponent(str));
}

// Convierte UTF-8 a UTF-16
function utf8ToUtf16(str) {
    return decodeURIComponent(escape(str));
}

// Función para desencriptar AES
async function aesDecrypt(ciphertext, password) {
    try {
        const bytes = CryptoJS.AES.decrypt(ciphertext, password);
        const originalText = bytes.toString(CryptoJS.enc.Utf8);
        return originalText;
    } catch(e) {
        console.error("❌ Error desencriptando AES:", e);
        return '';
    }
}

async function obtenerM1M2M3(m, pw) {
    try {
        if (!m || !pw) throw new Error("m o pw vacíos");

        // Paso 1: Decodificar URI
        const mDecodificado = decodeURIComponent(m);

        // Paso 2: Desencriptar AES
        const mDesencriptado = await aesDecrypt(mDecodificado, pw);

        // Paso 3: Convertir UTF-8 a UTF-16 para LZString
        const mUTF16 = utf8ToUtf16(mDesencriptado);

        // Paso 4: Descomprimir con LZString
        const mDescomprimido = LZString.decompressFromUTF16(mUTF16);

        // Paso 5: Separar m1, m2, m3
        const [m1, m2, m3] = mDescomprimido.split('|');

        return { m1, m2, m3 };
    } catch(e) {
        console.error("❌ Error obteniendo m1 m2 m3:", e);
        return null;
    }
}

// -------- RECONSTRUIR MQTT DESDE M ENCRIPTADO --------
let m1, m2, m3;


(async () => {
    const resultado = await obtenerM1M2M3(mEncriptado, pw);

    if (!resultado) {
        console.error("❌ No se pudo reconstruir m1, m2, m3. MQTT no se conectará.");
        return;
    }

    ({ m1, m2, m3 } = resultado);

    // Ajuste de m3 para conexión MQTT
    m3 = "wss://" + m3 + ".s1.eu.hivemq.cloud:8884/mqtt";
})();

<div>m1: <span id="m1-text"></span></div>
<div>m2: <span id="m2-text"></span></div>
<div>m3: <span id="m3-text"></span></div>


    // -------- CONEXIÓN MQTT --------
    const client = mqtt.connect(m3, {username: m1, password: m2, connectTimeout: 3000});
    client.on('connect', ()=>console.log("✅ Conectado a HiveMQ Cloud"));
    client.on('error', err=>console.log("❌ Error MQTT:",err));

    // -------- AQUÍ VA TODO TU CÓDIGO QUE DEPENDE DE client --------
    // Por ejemplo: enviarMQTT, suscripciones, listeners, botones, etc.




client.on('connect', ()=>console.log("✅ Conectado a HiveMQ Cloud"));
client.on('error', err=>console.log("❌ Error MQTT:",err));

function enviarMQTT(topic, accion) { 
  if (!ct || ct.trim() === '') {
    console.error("❌ ERROR: CT no está definido. No se puede enviar MQTT.");
    return;
  }
  const ahora = new Date();
  const fechaHoraEnvio = ahora.toISOString();
  if (!topic.startsWith(ct)) {
    const separador = (ct.endsWith('/') || topic.startsWith('/')) ? '' : '/';
    topic = `${ct}${separador}${topic}`;
  }
  let duracion_rele = 0;

  if (topic.includes('/portal')) {
    duracion_rele = parseInt(localStorage.getItem('tiempo_abrir')) || 3;

  } else if (topic.includes('/apto')) {
    duracion_rele = parseInt(localStorage.getItem('tiempo_abrirApto')) || 3;

  } else if (topic.includes('/luz')) {
    const num = topic.match(/luz(\d+)/)[1];
    const minutos = parseInt(localStorage.getItem('tiempo_' + num)) || 60;

    if(minutos === 999999){
      duracion_rele = 999999; // 🔥 continuo no se convierte
    } else {
      duracion_rele = minutos * 60; // minutos → segundos
    }
  }



  const mensaje = {
    id: ahora.getTime(),
    fechaHoraEnvio,
    accion,
    clave: k,
    ct: ct, 
    apartamento: a,
    fechaAlta: fa,
    fechaEntrada: fe,
    horaEntrada: he,
    fechaFin: fs,
    horaFin: hs,
    cp_portal: +cp,
    ca_apto: +ca,
    l_luz: l,
    duracion_rele,
    pw: pw 
  };
  console.log(`➡️ MQTT: ${topic}`, mensaje);
  client.publish(topic, JSON.stringify(mensaje), { qos: 1 }, err => {
    if (err) console.log("❌ Error al publicar:", err);
  });
}

// -------- ELEMENTOS --------
const btnAbrir = document.getElementById('abrir');
const btnAbrirApto = document.getElementById('abrirApto');
const estadoPortal = document.getElementById('estadoPortal');
const estadoApto = document.getElementById('estadoApto');
const estadoApartamento = document.getElementById('estadoApartamento');
const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');
let botonesLuz = [];

function formatearFechaHora(f,h){
  return {fecha: f?`${f.slice(0,4)}-${f.slice(4,6)}-${f.slice(6,8)}`:'-', hora:h?`${h.slice(0,2)}:${h.slice(2,4)}`:'-'};
}
const inicio = formatearFechaHora(fe,he);
const fin = formatearFechaHora(fs,hs);
document.getElementById('apartamento').textContent = a;
document.getElementById('fechaInicio').textContent = inicio.fecha;
document.getElementById('horaInicio').textContent = inicio.hora;
document.getElementById('fechaFin').textContent = fin.fecha;
document.getElementById('horaFin').textContent = fin.hora;


// -------- BOTONES LUCES --------
if(l>0){
  panelLuces.style.display='block';

  for(let i=1;i<=l;i++){
    const btn = document.createElement('button');
    btn.dataset.index = i;
    btn.classList.add('verde');
    btn.textContent = `Encender\nLuz ${i}`;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);

    // 👇 LISTENER AQUÍ (MEJOR)
 btn.addEventListener('click', ()=>{
  if(btn.disabled) return;

  const valor = parseInt(localStorage.getItem('tiempo_' + btn.dataset.index)) || 60;

  if(btn.classList.contains('verde')){
    // ENCENDER
    btn.classList.replace('verde','amarillo');
    btn.textContent = `Apagar\nLuz ${btn.dataset.index}`;
    enviarMQTT(`/luz${btn.dataset.index}`, 'ON');

    if(valor !== 999999){
      setTimeout(()=>{
        if(btn.classList.contains('amarillo')){
          btn.classList.replace('amarillo','verde');
          btn.textContent = `Encender\nLuz ${btn.dataset.index}`;
        }
      }, valor * 60 * 1000);
    }

  } else if(btn.classList.contains('amarillo')){
    // APAGAR MANUAL
    btn.classList.replace('amarillo','verde');
    btn.textContent = `Encender\nLuz ${btn.dataset.index}`;
    enviarMQTT(`/luz${btn.dataset.index}`, 'OFF');
  }
});
  }
}






// -------- SUSCRIPCIONES Y LISTENER GENERAL --------
client.on('connect', ()=>{
  const ahora = new Date();
  const fIni = new Date(`${inicio.fecha}T${inicio.hora}:00`);
  const fFin = new Date(`${fin.fecha}T${fin.hora}:00`);
  const acceso = ahora>=fIni && ahora<=fFin;
  if(!acceso) return;

  // Suscribir luces
  botonesLuz.forEach((btn,i)=>{
    client.subscribe(`${ct}/luz${i+1}`, {qos:1});
    enviarMQTT(`/luz${i+1}`,'get');
  });

  // Suscribir portal y apartamento
  client.subscribe(`${ct}/portal`, {qos:1});
  enviarMQTT('/portal','get');
  client.subscribe(`${ct}/apto`, {qos:1});
  enviarMQTT('/apto','get');
});

// -------- LISTENER GENERAL PARA TODOS LOS MENSAJES --------
client.on('message', (topic, message)=>{
  const msgStr = message.toString();

  botonesLuz.forEach((btn,i)=>{
    const subTopic = `${ct}/luz${i+1}`;
    if(topic === subTopic){

      // 🚫 SI ESTÁ EN AMARILLO, NO TOCAR (estado temporal)
      if(btn.classList.contains('amarillo')) return;

      if(msgStr === 'on'){
        btn.classList.replace('verde','amarillo');
        btn.textContent=`Apagar\nLuz ${i+1}`;
      } else {
        btn.classList.replace('amarillo','verde');
        btn.textContent=`Encender\nLuz ${i+1}`;
      }
    }
  });

  // -------- LOG PUERTAS --------
  if (topic === logTopic && popupLog.style.display === 'flex') {
    try {
      let logData = JSON.parse(message.toString());
      if (!Array.isArray(logData)) logData = [logData];  
  
      let html = '';
      logData.forEach(entry => {
        html += `<div>
            <strong>Puerta:</strong> ${entry.puerta || '-'}<br>
            <strong>Acción:</strong> ${entry.accion || '-'}<br>
            <strong>Fecha/Hora:</strong> ${entry.fechaHora || '-'}<br>
            <strong>Usuario:</strong> ${entry.usuario || '-'}<br>
            <hr>
        </div>`;
      });  

      contenidoLog.innerHTML = html || 'No hay entradas en el log.';
    } catch (e) {
      contenidoLog.textContent = 'Error al leer log.';
      console.error(e);
    }
  }

});




// -------- VALIDACIÓN ACCESO --------
function validarAcceso() {
  const ahora = new Date();
  const fIni = new Date(`${inicio.fecha}T${inicio.hora}:00`);
  const fFin = new Date(`${fin.fecha}T${fin.hora}:00`);
  const acceso = ahora >= fIni && ahora <= fFin;

  // --- Portal y apartamento: solo fecha/hora ---
  const portalActivo = acceso; // no depende de cp
  const aptoActivo = acceso;   // no depende de ca

  // Portal
  btnAbrir.disabled = !portalActivo;
  btnAbrir.classList.toggle('gris', !portalActivo);
  btnAbrir.classList.toggle('verde', portalActivo);
  document.querySelector('.panel.portal .titulo-panel').textContent =
    portalActivo ? 'Puerta Portal - ACTIVO' : 'Puerta Portal - INACTIVO';

  // Apartamento
  btnAbrirApto.disabled = !aptoActivo;
  btnAbrirApto.classList.toggle('gris', !aptoActivo);
  btnAbrirApto.classList.toggle('verde', aptoActivo);
  document.querySelector('.panel.apto .titulo-panel').textContent =
    aptoActivo ? 'Puerta Apartamento - ACTIVO' : 'Puerta Apartamento - INACTIVO';

  // --- Estado general ---
  estadoPortal.textContent = portalActivo ? 'ACTIVO' : 'INACTIVO';
  estadoPortal.style.color = portalActivo ? '#0b7a2a' : '#b30000';
  estadoApto.textContent = aptoActivo ? 'ACTIVO' : 'INACTIVO';
  estadoApto.style.color = aptoActivo ? '#0b7a2a' : '#b30000';
  estadoApartamento.textContent = acceso ? 'Activo' : 'Fuera de horario';
  estadoApartamento.style.color = acceso ? '#0b7a2a' : '#b30000';

  // --- Luces ---
  botonesLuz.forEach((b,i)=>{
    if (!acceso) { // gris solo si fuera de fechas/hora
      b.disabled = true;
      b.classList.remove('verde','amarillo');
      b.classList.add('gris');
      b.textContent = `Encender\nLuz ${i+1}`;
    } else {
      b.disabled = false;  // se puede pulsar según MQTT después
      b.classList.remove('gris','amarillo');
      b.classList.add('verde');
      b.textContent = `Encender\nLuz ${i+1}`;
    }
  });
}

// Ejecutar al cargar y cada minuto
validarAcceso();
setInterval(validarAcceso, 60000);



// -------- LISTENER CLICK PORTAL/APARTAMENTO --------
btnAbrir.addEventListener('click', () => {
  if(btnAbrir.disabled) return;

  // Poner botón en amarillo durante el tiempo del popup
  const duracion = parseInt(localStorage.getItem('tiempo_abrir')) || 3;
  btnAbrir.classList.replace('verde','amarillo');
  btnAbrir.textContent = `Abriendo\nPuerta Portal`;
  setTimeout(()=>{
    btnAbrir.classList.replace('amarillo','verde');
    btnAbrir.textContent = `Abrir Puerta Portal`;
  }, duracion*1000);

  // Enviar solo ON al ESP
  enviarMQTT('/portal', 'ON');
});

btnAbrirApto.addEventListener('click', () => {
  if(btnAbrirApto.disabled) return;

  const duracion = parseInt(localStorage.getItem('tiempo_abrirApto')) || 3;
  btnAbrirApto.classList.replace('verde','amarillo');
  btnAbrirApto.textContent = `Abriendo\nPuerta Apartamento`;
  setTimeout(()=>{
    btnAbrirApto.classList.replace('amarillo','verde');
    btnAbrirApto.textContent = `Abrir Puerta Apartamento`;
  }, duracion*1000);

  enviarMQTT('/apto', 'ON');
});









// -------- POPUP CONFIGURACIÓN --------
document.addEventListener('DOMContentLoaded', () => {
  const tituloPrincipal = document.getElementById('tituloPrincipal');
  const popupConfig = document.getElementById('popupConfig');
  const configBotones = document.getElementById('configBotones');
  const cerrarPopup = document.getElementById('cerrarPopup');
  let pulsacionTimer;

  function iniciarPulsacion() { 
    pulsacionTimer = setTimeout(mostrarPopupConfig, 1000); 
  }

  function cancelarPulsacion() { 
    clearTimeout(pulsacionTimer); 
  }

  if (tituloPrincipal) {
    ['mousedown','touchstart'].forEach(e => tituloPrincipal.addEventListener(e, iniciarPulsacion));
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(e => tituloPrincipal.addEventListener(e, cancelarPulsacion));
  }

  if(cerrarPopup && popupConfig) {
    cerrarPopup.addEventListener('click', ()=> popupConfig.style.display='none');
  }

  function mostrarPopupConfig(){
    if(!popupConfig || !configBotones) return;
    popupConfig.style.display='block';
    configBotones.innerHTML='';
    const todosBotones = [
      {id:'abrir', nombre:'Puerta Portal', tipo:'portal'},
      {id:'abrirApto', nombre:'Puerta Apartamento', tipo:'apto'},
      ...botonesLuz.map(b=>({id:b.dataset.index, nombre:`Luz ${b.dataset.index}`, tipo:'luz'}))
    ];
    const valoresPortalApto = [1,2,3,4];
   
    const valoresLuces = [
          1,5,15,30,45,
          60,120,180,240,300,360,420,480,540,600, // hasta 10h
          660,720,780,840,900,960,1020,1080,1140,1200, // 11h a 20h
          1260,1320,1380,1440, // 21h a 24h
         'Continuo'
    ];






    todosBotones.forEach(boton=>{
      const div = document.createElement('div');
      div.style.display='flex';
      div.style.alignItems='center';
      const label = document.createElement('span');
      label.textContent = boton.nombre;
      label.style.width='200px';
      const select = document.createElement('select');
      select.dataset.botonId = boton.id;
      select.style.fontSize = '1.6rem';
      select.style.padding = '0.4rem';
      select.style.height = '45px';
      select.style.width = '180px';
      const opciones = (boton.tipo==='portal'||boton.tipo==='apto') ? valoresPortalApto : valoresLuces;
      opciones.forEach(v=>{
        const opt = document.createElement('option');
        opt.value = (v==='Continuo') ? 999999 : v;
        if(boton.tipo==='portal'||boton.tipo==='apto') opt.textContent = v+' segundos';
        else if(v==='Continuo') opt.textContent='Continuo';
        else if(v<60) opt.textContent=v+' minutos';
        else opt.textContent = `${v/60} Horas`;
        select.appendChild(opt);
      });
      const valorGuardado = localStorage.getItem('tiempo_'+boton.id);
      if(valorGuardado) select.value = valorGuardado;
      select.addEventListener('change', ()=>localStorage.setItem('tiempo_'+boton.id, select.value));
      div.appendChild(label);
      div.appendChild(select);
      configBotones.appendChild(div);
    });
  }

  window.mostrarPopupConfig = mostrarPopupConfig;

});
</script>


<script>
//--***********************************************
//-- -------- POPUP LOG GENERAL DE PUERTAS --------
//--***********************************************
// Variables globales para el popup log
const popupLog = document.getElementById('popupLog');
const tituloLog = document.getElementById('tituloLog');
const contenidoLog = document.getElementById('contenidoLog');
const logTopic = `${ct}/puertas/log`;
const cerrarPopupLog = document.getElementById('cerrarPopupLog');

if(cerrarPopupLog && popupLog){
  cerrarPopupLog.addEventListener('click', ()=>{
    popupLog.style.display = 'none';
  });
}

// Suscripción única al topic de log
client.subscribe(logTopic, { qos: 1 });


// Función para mostrar popup log
function mostrarPopupLogGeneral() {
  if(!popupLog || !tituloLog || !contenidoLog) return;

  tituloLog.textContent = 'Apertura de Puertas';
  contenidoLog.textContent = 'Cargando log...';
  popupLog.style.display = 'flex';

  // Enviar petición MQTT para obtener log
  const ahora = new Date();

  let duracion_rele = parseInt(localStorage.getItem('tiempo_rele')) || 3;
  
  const mensaje = {
    id: ahora.getTime(),
    fechaHoraEnvio: ahora.toISOString(),
    accion: 'getLog',
    clave: k,
    ct: ct,
    apartamento: a,
    fechaAlta: fa,
    fechaEntrada: fe,
    horaEntrada: he,
    fechaFin: fs,
    horaFin: hs,
    cp_portal: +cp,
    ca_apto: +ca,
    l_luz: l,
    duracion_rele,
    pw: pw                 // <-- usamos la variable extraída
  };

  console.log("📡 ENVIANDO GETLOG MQTT:", logTopic, mensaje);
  client.publish(logTopic, JSON.stringify(mensaje), { qos: 1 }, err => {
    if(err) console.error('Error al pedir log:', err);
  });
}
</script>




<script>
// ***********************************************************
// -------- PULSACIÓN LARGA GENERAL PARA LOS TITULOS --------
// ***********************************************************
const titulos = document.querySelectorAll('.panel .titulo-panel');

titulos.forEach(titulo => {
  let timer;
  let pulsado = false;

  const startPress = () => {
    pulsado = false;
    timer = setTimeout(() => {
      pulsado = true;
      mostrarPopupLogGeneral();
    }, 2000);
  };

  const endPress = () => clearTimeout(timer);

  ['mousedown','touchstart'].forEach(e => titulo.addEventListener(e, startPress));
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(e => titulo.addEventListener(e, endPress));
});

</script>
