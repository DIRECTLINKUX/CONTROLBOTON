<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada{
  display:grid;
  grid-template-columns: auto auto auto;
  row-gap:0.5rem;
  font-size:2.5rem;
}
.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line; 
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }

#popupConfig {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:2rem;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999; 
  max-height:80%;
  max-width:90%;
  width:400px; 
  overflow-y:auto;
}
#popupConfig select {
  font-size: 1.5rem;
  padding: 0.3rem;
  margin-left: 1rem;
}
#popupConfig button { cursor:pointer; }
</style>
</head>
<body>
<div class="cuadro">
  <button id="tituloPrincipal" style="font-size:4.5rem; margin-bottom:1rem; width:100%; background:linear-gradient(to bottom,#1f7a3a,#0f4f23); color:white; border:none; border-radius:15px; padding:1rem; cursor:pointer;">
    Apertura de Puertas
  </button>

  <div class="fecha-hora">
    Apartamento: <span id="apartamento"></span>
    <span id="estadoApartamento" style="font-weight:bold;"></span>
  </div>
  <div class="fecha-hora fecha-hora-combinada">
    <span>Inicio:</span>
    <span id="fechaInicio"></span>
    <span id="horaInicio"></span>
    <span>Fin:</span>
    <span id="fechaFin"></span>
    <span id="horaFin"></span>
  </div>

  <div class="panel portal">
    <div class="titulo-panel">Puerta Portal</div>
    <div class="estadoPuerta" id="estadoPortal"></div>
    <div class="botones">
      <button id="abrir" class="verde">Abrir Puerta Portal</button>
    </div>
  </div>

  <div class="panel apto">
    <div class="titulo-panel">Puerta Apartamento</div>
    <div class="estadoPuerta" id="estadoApto"></div>
    <div class="botones">
      <button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
    </div>
  </div>

  <div class="panel luces" id="panelLuces" style="display:none;">
    <div class="titulo-panel">Luces</div>
    <div class="botones" id="botonesLuces"></div>
  </div>
</div>

<div id="popupConfig">
  <h3>Configuración de Tiempos</h3>
  <div id="configBotones" style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;"></div>
  <button id="cerrarPopup" style="margin-top:1rem; padding:0.5rem 1rem; font-size:1.5rem; background:#333; color:white; border-radius:8px;">Cerrar</button>
</div>

<script>
// -------- PARÁMETROS URL --------
const params = new URLSearchParams(window.location.search);
const a = Math.min(Math.max(parseInt(params.get('a')),1),100) || 1;
const fe = params.get('fe');  
const he = params.get('he');  
const fs = params.get('fs');  
const hs = params.get('hs');  
const cp = params.get('cp')==='1'; 
const ca = params.get('ca')==='1'; 
const l = parseInt(params.get('l'))||0; 
const k = params.get('k'); 
const fa = params.get('fa'); 
const m = params.get('m'); 

// -------- MQTT --------
const partesMQTT = m.split('*');
const username = partesMQTT[0];
const password = partesMQTT[1];
const broker = partesMQTT[2];

let client = null;
let clienteConectado = false;

// -------- BOTONES LUCES --------
const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');
let botonesLuz=[];

if(l>0){
  panelLuces.style.display='block';
  for(let i=1;i<=l;i++){
    const btn = document.createElement('button');
    btn.dataset.index=i;
    btn.classList.add('verde');
    btn.textContent = `Encender\nLuz ${i}`;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);
    if(!localStorage.getItem('tiempo_'+i)) localStorage.setItem('tiempo_'+i,36000);
  }
}

// -------- FUNCION CONECTAR MQTT --------
function conectarMQTT() {
  client = mqtt.connect(broker,{username,password});

  client.on('connect', ()=>{
    clienteConectado = true;
    console.log("✅ Conectado a HiveMQ Cloud");

    for(let i=1;i<=l;i++){
      client.subscribe(`apartamento${a}/luz${i}`);
      console.log("📡 Suscrito a:",`apartamento${a}/luz${i}`);
      // Solicitar estado al conectar
      enviarMQTT(`apartamento${a}/luz${i}`,'STATUS');
    }
  });

  client.on('error', e=>console.log("❌ Error MQTT:",e));
  client.on('close', ()=>{ clienteConectado=false; console.log("⚠️ Conexión MQTT cerrada"); });
  client.on('offline', ()=>{ clienteConectado=false; console.log("⚠️ MQTT offline"); });

  // -------- RECIBIR MENSAJES MQTT --------
  client.on('message',(topic,message)=>{
    botonesLuz.forEach((btn,index)=>{
      const luzTopic = `apartamento${a}/luz${index+1}`;
      if(topic === luzTopic){
        const estado = message.toString().toLowerCase();
        if(estado==='off'){
          btn.classList.replace('amarillo','verde');
          btn.textContent = `Encender Luz ${index+1}`;
        } else if(estado==='on'){
          btn.classList.replace('verde','amarillo');
          btn.textContent = `Encendida Luz ${index+1}`;
        }
      }
    });
  });
}

// Llamada inicial
conectarMQTT();

// -------- FUNCION ENVIAR MQTT --------
function enviarMQTT(topic,accion){
  if(!clienteConectado) return;
  const ahora = new Date();
  const fechaHoraEnvio = ahora.toISOString(); 
  let duracion_rele=0;
  if(topic.includes('/portal')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrir'))||3;
  else if(topic.includes('/apto')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrirApto'))||3;
  else if(topic.includes('/luz')){
    const n = topic.match(/luz(\d+)/)[1];
    duracion_rele = parseInt(localStorage.getItem('tiempo_'+n))||36000;
  }
  const mensaje = {
    id:ahora.getTime(), accion, clave:k, apartamento:a,
    fechaAlta:fa, fechaEntrada:fe, horaEntrada:he,
    fechaFin:fs, horaFin:hs, fechaHoraEnvio, duracion_rele
  };
  client.publish(topic,JSON.stringify(mensaje),{qos:1}, err=>{if(err) console.log(err);});
}

// -------- RESTO DEL CÓDIGO (fechas, validaciones, botones portal/apto y popup) --------
// ... Mantén exactamente todo igual que tu última versión ...

</script>
</body>
</html>
