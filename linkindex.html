<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada {
  display: flex;
  flex-direction: column;
  font-size: 2rem;
  gap: 0.5rem;
}
.inicioLinea, .finLinea {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
}
@media (min-width: 480px) {
  .fecha-hora-combinada {
    flex-direction: row;
    justify-content: center;
  }
}
.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line;
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }
</style>
</head>
<body>

<div class="cuadro">
<button id="tituloPrincipal" style="font-size:4.5rem;width:100%;background:linear-gradient(to bottom,#1f7a3a,#0f4f23);color:white;border:none;border-radius:15px;padding:1rem;">
Apertura de Puertas
</button>

<div class="fecha-hora">
Apartamento: <span id="apartamento">-</span>
<span id="estadoApartamento" style="font-weight:bold;">-</span>
</div>

<div class="fecha-hora fecha-hora-combinada">
  <div class="inicioLinea">
    <span>Inicio:</span>
    <span id="fechaInicio">-</span>
    <span id="horaInicio">-</span>
  </div>
  <div class="finLinea">
    <span>Fin:</span>
    <span id="fechaFin">-</span>
    <span id="horaFin">-</span>
  </div>
</div>

<div class="panel portal">
<div class="titulo-panel">Puerta Portal</div>
<div class="estadoPuerta" id="estadoPortal">-</div>
<div class="botones">
<button id="abrir" class="verde">Abrir Puerta Portal</button>
</div>
</div>

<div class="panel apto">
<div class="titulo-panel">Puerta Apartamento</div>
<div class="estadoPuerta" id="estadoApto">-</div>
<div class="botones">
<button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
</div>
</div>

<div class="panel luces" id="panelLuces" style="display:none;">
<div class="titulo-panel">Luces</div>
<div class="botones" id="botonesLuces"></div>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async ()=>{

// -------- VALORES POR DEFECTO --------
let decoded = {};
const params = new URLSearchParams(window.location.search);
let d = params.get('d') || '';
try {
  if(d){
    const d_url = decodeURIComponent(d);
    const base = d_url.replace(/-/g,'+').replace(/_/g,'/');
    const paramStr = decodeURIComponent(atob(base));
    paramStr.split('&').forEach(p=>{
      const [key,val] = p.split('=');
      decoded[key] = val || '';
    });
  }
} catch(e){
  console.error("Error decodificando d:", e);
}

const k = decoded['k'] || 'default_k';
const a = decoded['a'] || '000';
const ct = decoded['ct'] || 'default_ct';
const fa = decoded['fa'] || '';
const fe = decoded['fe'] || '';
const he = decoded['he'] || '';
const fs = decoded['fs'] || '';
const hs = decoded['hs'] || '';
const cp = decoded['cp']==='1';
const ca = decoded['ca']==='1';
const l = parseInt(decoded['l'])||2; // por defecto 2 luces
const ia = decoded['ia']||0;

// -------- FUNCIONES AUXILIARES --------
function formatearFechaHora(f,h){
  return {fecha: f?`${f.slice(0,4)}-${f.slice(4,6)}-${f.slice(6,8)}`:'-', hora:h?`${h.slice(0,2)}:${h.slice(2,4)}`:'-'};
}
const inicio = formatearFechaHora(fe,he);
const finT = formatearFechaHora(fs,hs);

document.getElementById('apartamento').textContent = a;
document.getElementById('fechaInicio').textContent = inicio.fecha;
document.getElementById('horaInicio').textContent = inicio.hora;
document.getElementById('fechaFin').textContent = finT.fecha;
document.getElementById('horaFin').textContent = finT.hora;

// -------- BOTONES LUCES --------
const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');
let botonesLuz = [];
if(l>0){
  panelLuces.style.display='block';
  for(let i=1;i<=l;i++){
    const btn = document.createElement('button');
    btn.dataset.index = i;
    btn.classList.add('verde');
    btn.textContent = `Encender\nLuz ${i}`;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);
    btn.addEventListener('click', ()=>{alert('Simulación MQTT: Luz '+btn.dataset.index);});
  }
}

// -------- VALIDACIÓN ACCESO SIMULADA --------
function validarAcceso(){
  const ahora = new Date();
  const acceso = true; // simulación siempre activa
  const btnAbrir = document.getElementById('abrir');
  const btnAbrirApto = document.getElementById('abrirApto');
  const estadoPortal = document.getElementById('estadoPortal');
  const estadoApto = document.getElementById('estadoApto');
  const estadoApartamento = document.getElementById('estadoApartamento');

  // Portal
  btnAbrir.disabled = !acceso;
  btnAbrir.classList.toggle('gris', !acceso);
  btnAbrir.classList.toggle('verde', acceso);
  estadoPortal.textContent = acceso ? 'ACTIVO' : 'INACTIVO';
  estadoPortal.style.color = acceso ? '#0b7a2a' : '#b30000';

  // Apartamento
  btnAbrirApto.disabled = !acceso;
  btnAbrirApto.classList.toggle('gris', !acceso);
  btnAbrirApto.classList.toggle('verde', acceso);
  estadoApto.textContent = acceso ? 'ACTIVO' : 'INACTIVO';
  estadoApto.style.color = acceso ? '#0b7a2a' : '#b30000';

  estadoApartamento.textContent = acceso ? 'Activo' : 'Fuera de horario';
  estadoApartamento.style.color = acceso ? '#0b7a2a' : '#b30000';

  // Luces
  botonesLuz.forEach((b,i)=>{
    b.disabled = !acceso;
    b.classList.remove('gris','amarillo');
    b.classList.add('verde');
    b.textContent = `Encender\nLuz ${i+1}`;
  });
}

validarAcceso();
setInterval(validarAcceso,60000);

// -------- BOTONES SIMULACIÓN --------
document.getElementById('abrir').addEventListener('click', ()=>alert('Simulación: Abrir Portal'));
document.getElementById('abrirApto').addEventListener('click', ()=>alert('Simulación: Abrir Apartamento'));

});
</script>
</body>
</html>
