<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada{
  display:grid;
  grid-template-columns: 140px 220px 120px;
  row-gap:0.5rem;
  font-size:2.5rem;
}
.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line;
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }
</style>
</head>

<body>
<div class="cuadro">

<button id="tituloPrincipal" style="font-size:4.5rem;width:100%;background:linear-gradient(to bottom,#1f7a3a,#0f4f23);color:white;border:none;border-radius:15px;padding:1rem;">
Apertura de Puertas
</button>

<div class="fecha-hora">
Apartamento: <span id="apartamento"></span>
<span id="estadoApartamento" style="font-weight:bold;"></span>
</div>

<div class="fecha-hora fecha-hora-combinada">
<span>Inicio:</span>
<span id="fechaInicio"></span>
<span id="horaInicio"></span>
<span>Fin:</span>
<span id="fechaFin"></span>
<span id="horaFin"></span>
</div>

<div class="panel portal">
<div class="titulo-panel">Puerta Portal</div>
<div class="estadoPuerta" id="estadoPortal"></div>
<div class="botones">
<button id="abrir" class="verde">Abrir Puerta Portal</button>
</div>
</div>

<div class="panel apto">
<div class="titulo-panel">Puerta Apartamento</div>
<div class="estadoPuerta" id="estadoApto"></div>
<div class="botones">
<button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
</div>
</div>

<div class="panel luces" id="panelLuces" style="display:none;">
<div class="titulo-panel">Luces</div>
<div class="botones" id="botonesLuces"></div>
</div>

<!-- POPUP CONFIG -->
<div id="popupConfig" style="display:none;position:fixed;top:10%;left:50%;transform:translateX(-50%);background:white;padding:2rem;border-radius:15px;box-shadow:0 10px 20px rgba(0,0,0,0.3);z-index:1000;">
<h2>Configuración</h2>
<div id="configBotones"></div>
<button id="cerrarPopup" style="margin-top:1rem;padding:0.5rem 1rem;font-size:1.5rem;">Cerrar</button>
</div>

</div>

<script>
document.addEventListener('DOMContentLoaded', ()=>{
  // -------- DECODIFICAR PARÁMETRO d --------
  function base64urlDecode(str){
    str = str.replace(/-/g,'+').replace(/_/g,'/');
    while(str.length % 4) str += '=';
    return atob(str);
  }

  const params = new URLSearchParams(window.location.search);
  let d = params.get('d') || '';
  let decoded = {};

  try{
    const d_url = decodeURIComponent(d);
    const base = base64urlDecode(d_url);
    const paramStr = decodeURIComponent(base);

    paramStr.split('&').forEach(p=>{
      const [key,val] = p.split('=');
      decoded[key] = val || '';
    });

    console.log("PARAMS DECODIFICADOS:",decoded);

  }catch(e){
    console.error("❌ Error decodificando link:",e);
  }

  // -------- EXTRAER PARÁMETROS --------
  const k   = decoded['k'];
  const a   = decoded['a'];
  const ct  = decoded['ct'];
  const fa  = decoded['fa'];
  const fe  = decoded['fe'];
  const he  = decoded['he'];
  const fs  = decoded['fs'];
  const hs  = decoded['hs'];
  const cp  = decoded['cp']==='1';
  const ca  = decoded['ca']==='1';
  const l   = parseInt(decoded['l'])||0;

  const m1  = decoded['m1'];
  const m2  = decoded['m2'];
  let m3 = decoded['m3'] || '';
  if(m3) m3 = "wss://" + m3 + ".s1.eu.hivemq.cloud:8884/mqtt";

  console.log("MQTT URL:", m3);
  console.log("MQTT USER:", m1);
  console.log("MQTT PASS:", m2);

  // -------- CONEXIÓN MQTT --------
  const client = mqtt.connect(m3,{username: m1,password: m2,connectTimeout: 3000});
  client.on('connect', ()=>console.log("✅ Conectado a HiveMQ Cloud"));
  client.on('error', err=>console.log("❌ Error MQTT:",err));

  function enviarMQTT(topic, accion) { 
    if (!ct || ct.trim() === '') {
      console.error("❌ ERROR: CT no está definido. No se puede enviar MQTT.");
      return;
    }
    const ahora = new Date();
    const fechaHoraEnvio = ahora.toISOString();
    if (!topic.startsWith(ct)) {
      const separador = (ct.endsWith('/') || topic.startsWith('/')) ? '' : '/';
      topic = `${ct}${separador}${topic}`;
    }

    let duracion_rele = 0;
    if (topic.includes('/portal')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrir')) || 3;
    else if (topic.includes('/apto')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrirApto')) || 3;
    else if (topic.includes('/luz')) {
      const num = topic.match(/luz(\d+)/)[1];
      duracion_rele = parseInt(localStorage.getItem('tiempo_' + num)) || 36000;
    }

    const mensaje = {
      id: ahora.getTime(),
      fechaHoraEnvio,
      accion,
      clave: k,
      ct: ct, 
      apartamento: a,
      fechaAlta: fa,
      fechaEntrada: fe,
      horaEntrada: he,
      fechaFin: fs,
      horaFin: hs,
      cp_portal: +cp,
      ca_apto: +ca,
      l_luz: l,
      duracion_rele
    };

    console.log(`➡️ MQTT: ${topic}`, mensaje);
    client.publish(topic, JSON.stringify(mensaje), { qos: 1 }, err => {
      if (err) console.log("❌ Error al publicar:", err);
    });
  }

  // -------- ELEMENTOS --------
  const btnAbrir = document.getElementById('abrir');
  const btnAbrirApto = document.getElementById('abrirApto');
  const estadoPortal = document.getElementById('estadoPortal');
  const estadoApto = document.getElementById('estadoApto');
  const estadoApartamento = document.getElementById('estadoApartamento');
  const panelLuces = document.getElementById('panelLuces');
  const botonesLuces = document.getElementById('botonesLuces');
  const tituloPrincipal = document.getElementById('tituloPrincipal');
  const popupConfig = document.getElementById('popupConfig');
  const configBotones = document.getElementById('configBotones');
  const cerrarPopup = document.getElementById('cerrarPopup');
  let botonesLuz = [];

  if(!btnAbrir || !btnAbrirApto || !tituloPrincipal || !popupConfig || !cerrarPopup){
    console.error("⚠️ Algunos elementos no se encontraron en el DOM");
    return;
  }

  function formatearFechaHora(f,h){
    return {fecha: f?`${f.slice(0,4)}-${f.slice(4,6)}-${f.slice(6,8)}`:'-', hora:h?`${h.slice(0,2)}:${h.slice(2,4)}`:'-'};
  }

  const inicio = formatearFechaHora(fe,he);
  const fin = formatearFechaHora(fs,hs);
  document.getElementById('apartamento').textContent = a;
  document.getElementById('fechaInicio').textContent = inicio.fecha;
  document.getElementById('horaInicio').textContent = inicio.hora;
  document.getElementById('fechaFin').textContent = fin.fecha;
  document.getElementById('horaFin').textContent = fin.hora;

  // -------- BOTONES LUCES --------
  if(l>0){
    panelLuces.style.display='block';
    for(let i=1;i<=l;i++){
      const btn = document.createElement('button');
      btn.dataset.index=i;
      btn.classList.add('verde');
      btn.textContent=`Encender\nLuz ${i}`;
      botonesLuces.appendChild(btn);
      botonesLuz.push(btn);
      btn.addEventListener('click', ()=>{
        if(btn.disabled) return;
        if(btn.classList.contains('verde')){
          btn.classList.replace('verde','amarillo');
          btn.textContent=`Apagar\nLuz ${i}`;
          enviarMQTT(`/luz${i}`, 'ON');
        }else{
          btn.classList.replace('amarillo','verde');
          btn.textContent=`Encender\nLuz ${i}`;
          enviarMQTT(`/luz${i}`, 'OFF');
        }
      });
    }
  }

  // -------- RESTO DEL CÓDIGO (INICIALIZAR, VALIDAR, EVENTOS) --------
  // Tu código restante se mantiene igual, ya dentro de DOMContentLoaded para evitar null errors
  // Ejemplo: validarAcceso(), eventos btnAbrir/btnAbrirApto, popupConfig, etc.

}); // Fin DOMContentLoaded
</script>
</body>
</html>
