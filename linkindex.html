<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada{
  display:grid;
  grid-template-columns: 140px 220px 120px;
  row-gap:0.5rem;
  font-size:2.5rem;
}
.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line; 
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }

#popupConfig {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:2rem;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999; 
  max-height:80%;
  max-width:90%;
  width:400px; 
  overflow-y:auto;
}
#popupConfig select {
  font-size: 1.5rem;
  padding: 0.3rem;
  margin-left: 1rem;
}
#popupConfig button { cursor:pointer; }
</style>
</head>
<body>
<div class="cuadro">
  <button id="tituloPrincipal" style="font-size:4.5rem; margin-bottom:1rem; width:100%; background:linear-gradient(to bottom,#1f7a3a,#0f4f23); color:white; border:none; border-radius:15px; padding:1rem; cursor:pointer;">
    Apertura de Puertas
  </button>

  <div class="fecha-hora">
    Apartamento: <span id="apartamento"></span>
    <span id="estadoApartamento" style="font-weight:bold;"></span>
  </div>
  <div class="fecha-hora fecha-hora-combinada">
    <span>Inicio:</span>
    <span id="fechaInicio"></span>
    <span id="horaInicio"></span>
    <span>Fin:</span>
    <span id="fechaFin"></span>
    <span id="horaFin"></span>
  </div>

  <div class="panel portal">
    <div class="titulo-panel">Puerta Portal</div>
    <div class="estadoPuerta" id="estadoPortal"></div>
    <div class="botones">
      <button id="abrir" class="verde">Abrir Puerta Portal</button>
    </div>
  </div>

  <div class="panel apto">
    <div class="titulo-panel">Puerta Apartamento</div>
    <div class="estadoPuerta" id="estadoApto"></div>
    <div class="botones">
      <button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
    </div>
  </div>

  <div class="panel luces" id="panelLuces" style="display:none;">
    <div class="titulo-panel">Luces</div>
    <div class="botones" id="botonesLuces"></div>
  </div>
</div>

<div id="popupConfig">
  <h3>Configuración de Tiempos</h3>
  <div id="configBotones" style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;"></div>
  <button id="cerrarPopup" style="margin-top:1rem; padding:0.5rem 1rem; font-size:1.5rem; background:#333; color:white; border-radius:8px;">Cerrar</button>
</div>

<script>
// -------- PARÁMETROS URL --------
const params = new URLSearchParams(window.location.search);
const a = Math.min(Math.max(parseInt(params.get('a')),1),100) || 1;
const fe = params.get('fe');  
const he = params.get('he');  
const fs = params.get('fs');  
const hs = params.get('hs');  
const cp = params.get('cp')==='1'; 
const ca = params.get('ca')==='1'; 
const l = parseInt(params.get('l'))||0; 
const k = params.get('k'); 
const fa = params.get('fa'); 
const m = params.get('m'); 

// -------- MQTT --------
const partesMQTT = m.split('*');
const username = partesMQTT[0];
const password = partesMQTT[1];
const broker = partesMQTT[2];
const client = mqtt.connect(broker,{username,password});
client.on('connect', ()=>console.log("✅ Conectado a HiveMQ Cloud"));
client.on('error', e=>console.log("❌ Error MQTT:",e));

function enviarMQTT(topic,accion){
  const ahora = new Date();
  const fechaHoraEnvio = ahora.toISOString(); 
  let duracion_rele=0;
  if(topic.includes('/portal')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrir'))||3;
  else if(topic.includes('/apto')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrirApto'))||3;
  else if(topic.includes('/luz')){
    const n = topic.match(/luz(\d+)/)[1];
    duracion_rele = parseInt(localStorage.getItem('tiempo_'+n))||36000;
  }

  const mensaje = {
    id:ahora.getTime(),
    accion,
    clave:k,
    apartamento:a,
    fechaAlta:fa,
    fechaEntrada:fe,
    horaEntrada:he,
    fechaFin:fs,
    horaFin:hs,
    fechaHoraEnvio,
    duracion_rele
  };
  console.log(`➡️ MQTT ${topic}`,mensaje);
  client.publish(topic,JSON.stringify(mensaje),{qos:1}, err=>{if(err) console.log(err);});
}

// -------- FECHAS --------
function formatearFechaHora(f,h){
  return {
    fecha: f? f.slice(0,4)+'-'+f.slice(4,6)+'-'+f.slice(6,8):'-',
    hora: h? h.slice(0,2)+':'+h.slice(2,4):'-'
  };
}
const inicio = formatearFechaHora(fe,he);
const fin = formatearFechaHora(fs,hs);
document.getElementById('apartamento').textContent = a;
document.getElementById('fechaInicio').textContent = inicio.fecha;
document.getElementById('horaInicio').textContent = inicio.hora;
document.getElementById('fechaFin').textContent = fin.fecha;
document.getElementById('horaFin').textContent = fin.hora;

// -------- BOTONES LUCES --------
const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');
let botonesLuz=[];

if(l>0){
  panelLuces.style.display='block';
  for(let i=1;i<=l;i++){
    const btn = document.createElement('button');
    btn.dataset.index=i;
    btn.classList.add('verde');
    btn.textContent = `Encender\nLuz ${i}`;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);
    // -------- PRIMERA VEZ --------
    if(!localStorage.getItem('tiempo_'+i)) localStorage.setItem('tiempo_'+i,36000);
  }
}

// -------- VALIDACIÓN ACCESO --------
const btnAbrir = document.getElementById('abrir');
const btnAbrirApto = document.getElementById('abrirApto');
const estadoPortal = document.getElementById('estadoPortal');
const estadoApto = document.getElementById('estadoApto');
const estadoApartamento = document.getElementById('estadoApartamento');

if(!localStorage.getItem('tiempo_abrir')) localStorage.setItem('tiempo_abrir',3);
if(!localStorage.getItem('tiempo_abrirApto')) localStorage.setItem('tiempo_abrirApto',3);

function validarAcceso(){
  const ahora = new Date();
  const fIni = new Date(`${inicio.fecha}T${inicio.hora}:00`);
  const fFin = new Date(`${fin.fecha}T${fin.hora}:00`);
  const acceso = (ahora>=fIni && ahora<=fFin);

  const aptoActivo = acceso && ca;
  const portalActivo = acceso && cp;

  btnAbrir.disabled = !portalActivo;
  btnAbrir.classList.toggle('gris',!portalActivo);
  btnAbrirApto.disabled = !aptoActivo;
  btnAbrirApto.classList.toggle('gris',!aptoActivo);

  estadoPortal.textContent = portalActivo ? 'ACTIVO' : 'INACTIVO';
  estadoPortal.style.color = portalActivo?'#0b7a2a':'#b30000';
  estadoApto.textContent = aptoActivo?'ACTIVO':'INACTIVO';
  estadoApto.style.color = aptoActivo?'#0b7a2a':'#b30000';
  estadoApartamento.textContent = acceso?'Activo':'Fuera de horario';
  estadoApartamento.style.color = acceso?'#0b7a2a':'#b30000';

  botonesLuz.forEach((b,i)=>{
    b.disabled = !aptoActivo;
    if(!aptoActivo){
      b.classList.remove('verde','amarillo');
      b.classList.add('gris');
      b.textContent = `Encender\nLuz ${i+1}`;
    }
  });
}
validarAcceso();
setInterval(validarAcceso,60000);

// -------- FUNCIONES PORTAL/APTO --------
function abrirBoton(btn,topic,storageKey,textoInicial){
  const tiempo = parseInt(localStorage.getItem(storageKey))||3;
  btn.classList.replace('verde','amarillo');
  btn.textContent = textoInicial;
  enviarMQTT(topic,'ON');
  setTimeout(()=>{ 
    if(!btn.disabled){ 
      btn.classList.replace('amarillo','verde'); 
      btn.textContent = btn===btnAbrir?'Abrir Puerta Portal':'Abrir Puerta Apartamento';
    } 
  }, tiempo*1000);
}
btnAbrir.addEventListener('click', ()=>{if(!btnAbrir.disabled) abrirBoton(btnAbrir,`apartamento${a}/portal`,'tiempo_abrir','Empuje la Puerta');});
btnAbrirApto.addEventListener('click', ()=>{if(!btnAbrirApto.disabled) abrirBoton(btnAbrirApto,`apartamento${a}/apto`,'tiempo_abrirApto','Empuje la Puerta');});

// -------- BOTONES LUCES (CLICK Y MQTT) --------
function iniciarContador(btn,segundos,textoFinal){
  setTimeout(()=>{ 
    if(btn.classList.contains('amarillo')){ 
      btn.classList.replace('amarillo','verde'); 
      btn.textContent=textoFinal; 
    } 
  }, segundos*1000);
}

botonesLuz.forEach((btn,index)=>{
  const num=index+1;
  // click
  btn.addEventListener('click', ()=>{
    if(btn.disabled) return;
    if(btn.classList.contains('verde')){
      const tiempo = parseInt(localStorage.getItem('tiempo_'+num))||36000;
      btn.classList.replace('verde','amarillo');
      iniciarContador(btn,tiempo,`Encender Luz ${num}`);
      enviarMQTT(`apartamento${a}/luz${num}`,'ON');
    } else {
      btn.classList.replace('amarillo','verde');
      btn.textContent = `Encender Luz ${num}`;
      enviarMQTT(`apartamento${a}/luz${num}`,'OFF');
    }
  });
});

// recibir MQTT
client.on('message',(topic,message)=>{
  botonesLuz.forEach((btn,index)=>{
    const luzTopic=`apartamento${a}/luz${index+1}`;
    if(topic===luzTopic){
      const estado=message.toString().toLowerCase();
      if(estado==='off'){
        btn.classList.replace('amarillo','verde');
        btn.textContent=`Encender Luz ${index+1}`;
      }
    }
  });
});

// -------- POPUP CONFIGURACIÓN --------
const tituloPrincipal=document.getElementById('tituloPrincipal');
const popupConfig=document.getElementById('popupConfig');
const configBotones=document.getElementById('configBotones');
const cerrarPopup=document.getElementById('cerrarPopup');

let pulsacionTimer;
function iniciarPulsacion(){ pulsacionTimer=setTimeout(mostrarPopupConfig,5000); }
function cancelarPulsacion(){ clearTimeout(pulsacionTimer); }

['mousedown','touchstart'].forEach(e=>tituloPrincipal.addEventListener(e,iniciarPulsacion));
['mouseup','mouseleave','touchend','touchcancel'].forEach(e=>tituloPrincipal.addEventListener(e,cancelarPulsacion));

function mostrarPopupConfig(){
  popupConfig.style.display='block';
  configBotones.innerHTML='';
  const todosBotones = [
    {id:'abrir', nombre:'Puerta Portal', tipo:'portal'},
    {id:'abrirApto', nombre:'Puerta Apartamento', tipo:'apto'},
    ...botonesLuz.map((b,i)=>({id:b.dataset.index, nombre:`Luz ${b.dataset.index}`, tipo:'luz'}))
  ];
  const valoresPortalApto=[1,2,3];
  const valoresLuces=[5,15,30,45,60,120,180,240,300,360,420,480,540,600,'Continuo'];

  todosBotones.forEach(boton=>{
    const div=document.createElement('div'); div.style.display='flex'; div.style.alignItems='center';
    const label=document.createElement('span'); label.textContent=boton.nombre; label.style.width='200px';
    const select=document.createElement('select'); select.dataset.botonId=boton.id;

    valores=(boton.tipo==='portal'||boton.tipo==='apto')?valoresPortalApto:valoresLuces;
    valores.forEach(v=>{
      const opt=document.createElement('option');
      opt.value=(v==='Continuo')?999999:v;
      if(boton.tipo==='portal'||boton.tipo==='apto') opt.textContent=v+' segundos';
      else if(typeof v==='number' && v<60) opt.textContent=v+' minutos';
      else if(v===60) opt.textContent='1 Hora';
      else if(v===120) opt.textContent='2 Horas';
      else if(v===180) opt.textContent='3 Horas';
      else if(v===240) opt.textContent='4 Horas';
      else if(v===300) opt.textContent='5 Horas';
      else if(v===360) opt.textContent='6 Horas';
      else if(v===420) opt.textContent='7 Horas';
      else if(v===480) opt.textContent='8 Horas';
      else if(v===540) opt.textContent='9 Horas';
      else if(v===600) opt.textContent='10 Horas';
      else if(v===999999) opt.textContent='Continuo';
      select.appendChild(opt);
    });

    const valorGuardado=localStorage.getItem('tiempo_'+boton.id);
    if(valorGuardado) select.value=valorGuardado;

    select.addEventListener('change',()=>localStorage.setItem('tiempo_'+boton.id,select.value));
    div.appendChild(label); div.appendChild(select);
    configBotones.appendChild(div);
  });
}
cerrarPopup.addEventListener('click',()=>popupConfig.style.display='none');

</script>
</body>
</html>
