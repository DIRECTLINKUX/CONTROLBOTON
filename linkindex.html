
<script>
(async ()=>{
// -------- DECODIFICAR PARÁMETRO d --------
function base64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length % 4) str += '=';
  return atob(str);
}

const params = new URLSearchParams(window.location.search);
let d = params.get('d') || '';
let decoded = {};

try{
  const d_url = decodeURIComponent(d);
  const base = base64urlDecode(d_url);
  const paramStr = decodeURIComponent(base);

  paramStr.split('&').forEach(p=>{
    const [key,val] = p.split('=');
    decoded[key] = val || '';
  });

  console.log("✅ PARAMS:", decoded);

// -------- EXTRAER PARÁMETROS (AHORA SÍ) --------
const k   = decoded['k'];
const a   = decoded['a'];
const ct  = decoded['ct'];
const fa  = decoded['fa'];
const fe  = decoded['fe'];
const he  = decoded['he'];
const fs  = decoded['fs'];
const hs  = decoded['hs'];
const cp  = decoded['cp']==='1';
const ca  = decoded['ca']==='1';
const l   = parseInt(decoded['l'])||0;
const ia  = decoded['ia'] || 0;





}catch(e){
  console.error("❌ Error decodificando:", e);
}


// -------- AES DECRYPT --------
async function aesDecrypt(cipherText, password) {
  const enc = new TextEncoder();
  const dec = new TextDecoder();

  const data = Uint8Array.from(atob(cipherText), c => c.charCodeAt(0));
  const salt = data.slice(0, 16);
  const iv = data.slice(16, 32);
  const ctArray = data.slice(32);

  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );

  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-CBC", length: 256 },
    false,
    ["decrypt"]
  );

  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-CBC", iv },
    key,
    ctArray
  );

  return dec.decode(decrypted);
}

// -------- DESENCRIPTAR MQTT --------
if(decoded['m123e'] && decoded['pl']){
  try {
    const descifrado = await aesDecrypt(decoded['m123e'], decoded['pl']);
    const descomprimido = LZString.decompressFromUTF16(descifrado);
    const [m1, m2, m3] = descomprimido.split('|');

    window.m1 = m1;
    window.m2 = m2;
    window.m3 = m3.startsWith('wss://') ? m3 : `wss://${m3}.s1.eu.hivemq.cloud:8884/mqtt`;

    console.log("✅ MQTT:", window.m1, window.m2, window.m3);

    // 🔥 CREAR CLIENTE UNA SOLA VEZ
    window.client = mqtt.connect(window.m3, {
      username: window.m1,
      password: window.m2,
      connectTimeout: 5000
    });

    window.client.on('connect', ()=>console.log("✅ MQTT conectado"));
    window.client.on('error', err=>console.error("❌ MQTT error", err));

  } catch(e){
    console.error("❌ Error desencriptando:", e);
  }
}

})();
</script>
