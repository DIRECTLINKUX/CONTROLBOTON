<!DOCTYPE html>
<html lang="es">

<!-- ========================================= -->
<!-- BLOQUE 1 — CABECERA HTML -->
<!-- ========================================= -->
<head>

<meta charset="UTF-8">

<!-- Librería MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- ========================================= -->
<!-- BLOQUE 2 — ESTILOS CSS DE LA INTERFAZ -->
<!-- ========================================= -->
<style>

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}

.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}

h2{
  font-size:4.5rem;
  margin-bottom:1rem;
}

.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}

.fecha-hora-combinada{
  display:grid;
  grid-template-columns: 140px 220px 120px;
  row-gap:0.5rem;
  font-size:2.5rem;
}

.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}

.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }

.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}

.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}

button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line;
}

.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }

#popupConfig{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:2rem;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999;
  max-height:80%;
  max-width:90%;
  width:400px;
  overflow-y:auto;
}

#popupConfig select{
  font-size:1.5rem;
  padding:0.3rem;
  margin-left:1rem;
}

</style>

</head>


<!-- ========================================= -->
<!-- BLOQUE 3 — CUERPO DE LA INTERFAZ -->
<!-- ========================================= -->
<body>

<div class="cuadro">

<button id="tituloPrincipal"
style="font-size:4.5rem;margin-bottom:1rem;width:100%;background:linear-gradient(to bottom,#1f7a3a,#0f4f23);color:white;border:none;border-radius:15px;padding:1rem;">
Apertura de Puertas
</button>


<!-- ========================================= -->
<!-- BLOQUE 4 — INFORMACIÓN APARTAMENTO -->
<!-- ========================================= -->

<div class="fecha-hora">
Apartamento:
<span id="apartamento"></span>
<span id="estadoApartamento" style="font-weight:bold;"></span>
</div>

<div class="fecha-hora fecha-hora-combinada">

<span>Inicio:</span>
<span id="fechaInicio"></span>
<span id="horaInicio"></span>

<span>Fin:</span>
<span id="fechaFin"></span>
<span id="horaFin"></span>

</div>



<!-- ========================================= -->
<!-- BLOQUE 5 — PANEL PUERTA PORTAL -->
<!-- ========================================= -->

<div class="panel portal">

<div class="titulo-panel">Puerta Portal</div>

<div class="estadoPuerta" id="estadoPortal"></div>

<div class="botones">
<button id="abrir" class="verde">
Abrir Puerta Portal
</button>
</div>

</div>



<!-- ========================================= -->
<!-- BLOQUE 6 — PANEL PUERTA APARTAMENTO -->
<!-- ========================================= -->

<div class="panel apto">

<div class="titulo-panel">Puerta Apartamento</div>

<div class="estadoPuerta" id="estadoApto"></div>

<div class="botones">
<button id="abrirApto" class="verde">
Abrir Puerta Apartamento
</button>
</div>

</div>



<!-- ========================================= -->
<!-- BLOQUE 7 — PANEL LUCES DINÁMICAS -->
<!-- ========================================= -->

<div class="panel luces" id="panelLuces" style="display:none;">

<div class="titulo-panel">Luces</div>

<div class="botones" id="botonesLuces"></div>

</div>

</div>



<!-- ========================================= -->
<!-- BLOQUE 8 — POPUP CONFIGURACIÓN TIEMPOS -->
<!-- ========================================= -->

<div id="popupConfig">

<h3>Configuración de Tiempos</h3>

<div id="configBotones"
style="display:flex;flex-direction:column;gap:1rem;margin-top:1rem;">
</div>

<button id="cerrarPopup"
style="margin-top:1rem;padding:0.5rem 1rem;font-size:1.5rem;background:#555;color:white;border-radius:8px;">
Cerrar
</button>

</div>



<!-- ========================================= -->
<!-- BLOQUE 9 — SCRIPT PRINCIPAL -->
<!-- ========================================= -->

<script>


// ======================================================
// BLOQUE 10 — DECODIFICACIÓN BASE64 DE PARÁMETROS
// ======================================================

function base64urlDecode(str){

str = str.replace(/-/g,'+').replace(/_/g,'/');

while(str.length%4) str+='=';

return decodeURIComponent(atob(str).split('').map(c =>
'%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
).join(''));

}


const params = new URLSearchParams(window.location.search);

let d = params.get('d') || '';

let decoded = {};

try{

const paramStr = base64urlDecode(d);

const pares = paramStr.split('&');

pares.forEach(p=>{

const [key,val] = p.split('=');

decoded[key]=val||'';

});

}catch(e){

console.error("❌ Error decodificando link:",e);

}


// ======================================================
// BLOQUE 11 — EXTRACCIÓN PARÁMETROS DEL LINK
// ======================================================

const k  = decoded['k'];
const a  = decoded['a'];
const ct = decoded['ct'];

const fa = decoded['fa'];
const fe = decoded['fe'];
const he = decoded['he'];

const fs = decoded['fs'];
const hs = decoded['hs'];

const cp = decoded['cp']==='1';
const ca = decoded['ca']==='1';

const l  = parseInt(decoded['l'])||0;



// ======================================================
// BLOQUE 12 — DECODIFICAR DATOS MQTT
// ======================================================

let m1='',m2='',m3='';

if(decoded['m1']) m1=base64urlDecode(decoded['m1']);
if(decoded['m2']) m2=base64urlDecode(decoded['m2']);

if(decoded['m3']){

let broker = base64urlDecode(decoded['m3']);

m3="wss://"+broker+".s1.eu.hivemq.cloud:8884/mqtt";

}


// ======================================================
// BLOQUE 13 — CONEXIÓN MQTT
// ======================================================

const client = mqtt.connect(m3,{

username:m1,
password:m2,
connectTimeout:3000

});

client.on('connect',()=>console.log("MQTT conectado"));
client.on('error',err=>console.log("Error MQTT",err));



// ======================================================
// BLOQUE 14 — FUNCIÓN ENVÍO MQTT
// ======================================================

function enviarMQTT(topic,accion){

const ahora = new Date();

let duracion_rele=0;

if(topic.includes('/portal'))
duracion_rele=parseInt(localStorage.getItem('tiempo_abrir'))||3;

else if(topic.includes('/apto'))
duracion_rele=parseInt(localStorage.getItem('tiempo_abrirApto'))||3;

else if(topic.includes('/luz')){

const num = topic.match(/luz(\d+)/)[1];

duracion_rele=parseInt(localStorage.getItem('tiempo_'+num))||36000;

}


const mensaje={

id:ahora.getTime(),
fechaHoraEnvio:ahora.toISOString(),

accion,

clave:k,
ct:ct,
apartamento:a,

fechaAlta:fa,

fechaEntrada:fe,
horaEntrada:he,

fechaFin:fs,
horaFin:hs,

cp_portal:+cp,
ca_apto:+ca,
l_luz:l,

duracion_rele

};

if(!topic.startsWith(ct))
topic=ct+topic;

client.publish(topic,JSON.stringify(mensaje));

}



// ======================================================
// BLOQUE 15 — REFERENCIAS ELEMENTOS DOM
// ======================================================

const btnAbrir=document.getElementById('abrir');
const btnAbrirApto=document.getElementById('abrirApto');

const estadoPortal=document.getElementById('estadoPortal');
const estadoApto=document.getElementById('estadoApto');

const estadoApartamento=document.getElementById('estadoApartamento');

const panelLuces=document.getElementById('panelLuces');
const botonesLuces=document.getElementById('botonesLuces');

let botonesLuz=[];



// ======================================================
// BLOQUE 16 — FORMATEO FECHA HORA
// ======================================================

function formatearFechaHora(f,h){

return{

fecha:f?`${f.slice(0,4)}-${f.slice(4,6)}-${f.slice(6,8)}`:'-',

hora:h?`${h.slice(0,2)}:${h.slice(2,4)}`:'-'

};

}



const inicio=formatearFechaHora(fe,he);
const fin=formatearFechaHora(fs,hs);

document.getElementById('apartamento').textContent=a;

document.getElementById('fechaInicio').textContent=inicio.fecha;
document.getElementById('horaInicio').textContent=inicio.hora;

document.getElementById('fechaFin').textContent=fin.fecha;
document.getElementById('horaFin').textContent=fin.hora;



// ======================================================
// BLOQUE 17 — CREACIÓN BOTONES DE LUCES
// ======================================================

if(l>0){

panelLuces.style.display='block';

for(let i=1;i<=l;i++){

const btn=document.createElement('button');

btn.dataset.index=i;

btn.classList.add('verde');

btn.textContent=`Encender\nLuz ${i}`;

botonesLuces.appendChild(btn);

botonesLuz.push(btn);

btn.onclick=()=>{

if(btn.classList.contains('verde')){

btn.classList.replace('verde','amarillo');
btn.textContent=`Apagar\nLuz ${i}`;

enviarMQTT(`/luz${i}`,'ON');

}else{

btn.classList.replace('amarillo','verde');
btn.textContent=`Encender\nLuz ${i}`;

enviarMQTT(`/luz${i}`,'OFF');

}

};

}

}



// ======================================================
// BLOQUE 18 — VALIDACIÓN DE ACCESO POR HORARIO
// ======================================================

function validarAcceso(){

const ahora=new Date();

const fIni=new Date(`${inicio.fecha}T${inicio.hora}:00`);
const fFin=new Date(`${fin.fecha}T${fin.hora}:00`);

const acceso=ahora>=fIni && ahora<=fFin;

const aptoActivo=acceso && ca;
const portalActivo=acceso && cp;

btnAbrir.disabled=!portalActivo;
btnAbrirApto.disabled=!aptoActivo;

estadoPortal.textContent=portalActivo?'ACTIVO':'INACTIVO';
estadoApto.textContent=aptoActivo?'ACTIVO':'INACTIVO';

estadoApartamento.textContent=acceso?'Activo':'Fuera de horario';

}

validarAcceso();

setInterval(validarAcceso,60000);



// ======================================================
// BLOQUE 19 — EVENTOS BOTONES PORTAL Y APARTAMENTO
// ======================================================

btnAbrir.onclick=()=>{

const tiempo=parseInt(localStorage.getItem('tiempo_abrir'))||3;

btnAbrir.classList.replace('verde','amarillo');

btnAbrir.textContent="Empuje la Puerta";

enviarMQTT('/portal','ON');

setTimeout(()=>{

btnAbrir.classList.replace('amarillo','verde');

btnAbrir.textContent="Abrir Puerta Portal";

},tiempo*1000);

};


btnAbrirApto.onclick=()=>{

const tiempo=parseInt(localStorage.getItem('tiempo_abrirApto'))||3;

btnAbrirApto.classList.replace('verde','amarillo');

btnAbrirApto.textContent="Empuje la Puerta";

enviarMQTT('/apto','ON');

setTimeout(()=>{

btnAbrirApto.classList.replace('amarillo','verde');

btnAbrirApto.textContent="Abrir Puerta Apartamento";

},tiempo*1000);

};

</script>

</body>
</html>
