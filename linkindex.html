<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}

.fecha-hora-combinada {
  display: flex;
  flex-direction: column; /* columnas en móvil */
  font-size: 2rem;        /* más compacto en pantalla pequeña */
  gap: 0.5rem;
}

.inicioLinea, .finLinea {
  display: flex;
  flex-wrap: wrap;       /* si la pantalla es muy pequeña se puede ajustar */
  gap: 0.5rem;
  align-items: center;
}

@media (min-width: 480px) {
  .fecha-hora-combinada {
    flex-direction: row; /* en pantallas más grandes, inicio y fin en fila */
    justify-content: center;
  }
}

.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line;
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }
</style>
</head>

<body>

<div class="cuadro">

<button id="tituloPrincipal" style="font-size:4.5rem;width:100%;background:linear-gradient(to bottom,#1f7a3a,#0f4f23);color:white;border:none;border-radius:15px;padding:1rem;">
Apertura de Puertas
</button>

<div class="fecha-hora">
Apartamento: <span id="apartamento"></span>
<span id="estadoApartamento" style="font-weight:bold;"></span>
</div>

<div class="fecha-hora fecha-hora-combinada">
  <div class="inicioLinea">
    <span>Inicio:</span>
    <span id="fechaInicio"></span>
    <span id="horaInicio"></span>
  </div>
  <div class="finLinea">
    <span>Fin:</span>
    <span id="fechaFin"></span>
    <span id="horaFin"></span>
  </div>
</div>

<div class="panel portal">
<div class="titulo-panel">Puerta Portal</div>
<div class="estadoPuerta" id="estadoPortal"></div>
<div class="botones">
<button id="abrir" class="verde">Abrir Puerta Portal</button>
</div>
</div>

<div class="panel apto">
<div class="titulo-panel">Puerta Apartamento</div>
<div class="estadoPuerta" id="estadoApto"></div>
<div class="botones">
<button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
</div>
</div>

<div class="panel luces" id="panelLuces" style="display:none;">
<div class="titulo-panel">Luces</div>
<div class="botones" id="botonesLuces"></div>
</div>

</div>

<!-- POPUP CONFIGURACIÓN -->
<div id="popupConfig" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">
  <div style="background:white; border-radius:15px; padding:2rem; max-width:600px; width:50%; position:relative;">
    <span id="cerrarPopup" style="position:absolute; top:1rem; right:1rem; cursor:pointer; font-size:2rem;">✖</span>
    <h2 style="font-size:1.8rem;">Selección de Tiempo</h2>
    <div id="configBotones" style="margin-top:1rem;"></div>
  </div>
</div>

<!-- POPUP LOG PUERTA -->
<div id="popupLog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
     background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;">
  <div style="background:white; border-radius:15px; padding:2rem; max-width:600px; width:50%; position:relative;">
    <span id="cerrarPopupLog" style="position:absolute; top:1rem; right:1rem; cursor:pointer; font-size:2rem;">✖</span>
    <h2 style="font-size:1.8rem;" id="tituloLog">Log Puerta</h2>
    <div id="contenidoLog" style="margin-top:1rem; font-size:1.4rem;">Cargando log...</div>
  </div>
</div>

<script>
// ================== TODO TU CÓDIGO EXISTENTE ==================

// ---------- MODIFICACIÓN AÑADIDA: POPUP LOG FUNCIONAL ----------

const popupLog = document.getElementById('popupLog');
const tituloLog = document.getElementById('tituloLog');
const contenidoLog = document.getElementById('contenidoLog');
const cerrarPopupLog = document.getElementById('cerrarPopupLog');
const logTopic = `${ct}/puertas/log`;

if(cerrarPopupLog) cerrarPopupLog.addEventListener('click', ()=> popupLog.style.display='none');

// Suscribirse al topic de log
client.subscribe(logTopic, { qos:1 });

// Interceptar mensajes solo para el log si el popup está visible
const clientMessageOriginal = client.on.bind(client,'message');
client.on('message',(topic,msg)=>{
  const msgStr = msg.toString();

  // Solo log si popup visible
  if(topic === logTopic && popupLog.style.display==='flex'){
    try{
      let logData = JSON.parse(msgStr);
      if(!Array.isArray(logData)) logData=[logData];
      let html='';
      logData.forEach(entry=>{
        html += `<div>
          <strong>Puerta:</strong> ${entry.puerta || '-'}<br>
          <strong>Acción:</strong> ${entry.accion || '-'}<br>
          <strong>Fecha/Hora:</strong> ${entry.fechaHora || '-'}<br>
          <strong>Usuario:</strong> ${entry.usuario || '-'}<br>
          <hr>
        </div>`;
      });
      contenidoLog.innerHTML = html || 'No hay entradas en el log.';
    }catch(e){
      contenidoLog.textContent='Error al leer log.';
      console.error(e);
    }
  }
});

// Función para mostrar popup log y pedir datos al MQTT
function mostrarPopupLogGeneral(){
  if(!popupLog || !tituloLog || !contenidoLog) return;
  tituloLog.textContent='Apertura de Puertas';
  contenidoLog.textContent='Cargando log...';
  popupLog.style.display='flex';

  const ahora = new Date();
  const mensaje = {
    id: ahora.getTime(),
    fechaHoraEnvio: ahora.toISOString(),
    accion:'getLog',
    clave: k,
    ct: ct,
    apartamento: a,
    fechaAlta: fa,
    fechaEntrada: fe,
    horaEntrada: he,
    fechaFin: fs,
    horaFin: hs,
    cp_portal: +cp,
    ca_apto: +ca,
    l_luz: l,
    duracion_portal: parseInt(localStorage.getItem('tiempo_abrir')) || 3,
    duracion_apto: parseInt(localStorage.getItem('tiempo_abrirApto')) || 3,
    pw: decoded['pw'] || ''
  };
  client.publish(logTopic, JSON.stringify(mensaje), { qos:1 }, err=>{
    if(err) console.error('Error al pedir log:',err);
  });
}

// Pulsación larga 5s en los títulos de panel para abrir popup log
const titulos = document.querySelectorAll('.panel .titulo-panel');
titulos.forEach(titulo=>{
  let timer;
  const startPress = ()=>{ timer=setTimeout(mostrarPopupLogGeneral,5000); };
  const endPress = ()=> clearTimeout(timer);
  ['mousedown','touchstart'].forEach(e=>titulo.addEventListener(e,startPress));
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(e=>titulo.addEventListener(e,endPress));
});

// ================== FIN MODIFICACIÓN POPUP LOG ==================

</script>
</body>
</html>
