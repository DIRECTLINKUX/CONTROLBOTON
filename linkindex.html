<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apertura de Puertas</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}

.contenedor{
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  width:350px;
  text-align:center;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  font-size:14px;
  cursor:pointer;
}

.activo{background:#4CAF50;color:white;}
.inactivo{background:#ccc;color:#666;cursor:not-allowed;}
.gris{background:#999;color:white;}
.amarillo{background:#FFC107;color:black;}
.verde{background:#4CAF50;color:white;}

.luces-box{
  margin-top:15px;
  padding:10px;
  border:2px solid #ccc;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="contenedor">
  <h3>Apertura Apartamento</h3>

  <button id="btnPuerta" class="activo">Abrir Puerta</button>

  <div id="lucesContainer" class="luces-box" style="display:none;">
    <h4>Luces Apartamento</h4>
  </div>

</div>

<script>

// ================================
// Parámetros URL
// ================================
const params = new URLSearchParams(window.location.search);

const fa = params.get('fa');
const fe = params.get('fe');
const he = params.get('he');
const fs = params.get('fs');
const hs = params.get('hs');
const a = params.get('a') || 1;
const l = parseInt(params.get('l')) || 0;


// ================================
// MQTT
// ================================
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

function enviarMQTT(topic,mensaje){
  if(client.connected){
    client.publish(topic,mensaje);
  }
}


// ================================
// Crear botones luces
// ================================
const lucesContainer = document.getElementById("lucesContainer");
const botonesLuz = [];

if(l>0){
  lucesContainer.style.display="block";

  for(let i=1;i<=l;i++){
    const b=document.createElement("button");
    b.textContent="Punto "+i;
    b.classList.add("gris");
    b.disabled=true;

    b.onclick=function(){
      if(b.classList.contains("gris")){
        b.classList.remove("gris");
        b.classList.add("amarillo");
        enviarMQTT(`apartamento${a}/luz${i}`,"on");
      }else{
        b.classList.remove("amarillo","verde");
        b.classList.add("gris");
        enviarMQTT(`apartamento${a}/luz${i}`,"off");
      }
    };

    botonesLuz.push(b);
    lucesContainer.appendChild(b);
  }
}


// ================================
// Control horario
// ================================
let fueraHorarioApagado=false;

function dentroDeHorario(){
  if(!fa || !fe) return true;

  const ahora=new Date();
  const fechaActual=ahora.toISOString().slice(0,10);
  const horaActual=ahora.toTimeString().slice(0,5);

  if(fechaActual<fa || fechaActual>fe) return false;

  if(he && hs){
    if(horaActual<he || horaActual>hs) return false;
  }

  return true;
}


function validarAcceso(){

  const activo=dentroDeHorario();
  const btnPuerta=document.getElementById("btnPuerta");

  if(activo){

    btnPuerta.disabled=false;
    btnPuerta.classList.remove("inactivo");
    btnPuerta.classList.add("activo");

    botonesLuz.forEach(b=>{
      b.disabled=false;
    });

    fueraHorarioApagado=false;

  }else{

    btnPuerta.disabled=true;
    btnPuerta.classList.remove("activo");
    btnPuerta.classList.add("inactivo");

    botonesLuz.forEach((b,index)=>{
      b.disabled=true;
      b.classList.remove("amarillo","verde");
      b.classList.add("gris");
    });

    if(!fueraHorarioApagado && l>0){
      botonesLuz.forEach((b,index)=>{
        enviarMQTT(`apartamento${a}/luz${index+1}`,"off");
      });
      fueraHorarioApagado=true;
    }
  }
}


// ================================
// Botón puerta
// ================================
document.getElementById("btnPuerta").onclick=function(){
  if(dentroDeHorario()){
    enviarMQTT(`apartamento${a}/puerta`,"open");
  }
};


// ================================
setInterval(validarAcceso,10000);
validarAcceso();

</script>

</body>
</html>
