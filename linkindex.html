<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada{
  display:grid;
  grid-template-columns: 140px 220px 120px;
  row-gap:0.5rem;
  font-size:2.5rem;
}
.panel{
  border-radius:15px;
  padding:1rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.titulo-panel{
  font-size:2.5rem;
  font-weight:bold;
  padding:0.5rem 0;
  margin-bottom:1rem;
  border-bottom:2px solid #aaa;
  background: rgba(255,255,255,0.4);
  border-radius:8px;
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}
button{
  width:180px;
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space:pre-line; 
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }

#popupConfig {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:2rem;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  z-index:9999; 
  max-height:80%;
  max-width:90%;
  width:400px; 
  overflow-y:auto;
}
#popupConfig select {
  font-size: 1.5rem;
  padding: 0.3rem;
  margin-left: 1rem;
}
#popupConfig button {
  cursor:pointer;
}
</style>
</head>
<body>
<div class="cuadro">
  <button id="tituloPrincipal" style="font-size:4.5rem; margin-bottom:1rem; width:100%; background:linear-gradient(to bottom,#1f7a3a,#0f4f23); color:white; border:none; border-radius:15px; padding:1rem; cursor:pointer;">
    Apertura de Puertas
  </button>

  <div class="fecha-hora">
    Apartamento: <span id="apartamento"></span>
    <span id="estadoApartamento" style="font-weight:bold;"></span>
  </div>
  <div class="fecha-hora fecha-hora-combinada">
    <span>Inicio:</span>
    <span id="fechaInicio"></span>
    <span id="horaInicio"></span>
    <span>Fin:</span>
    <span id="fechaFin"></span>
    <span id="horaFin"></span>
  </div>

  <div class="panel portal">
    <div class="titulo-panel">Puerta Portal</div>
    <div class="estadoPuerta" id="estadoPortal"></div>
    <div class="botones">
      <button id="abrir" class="verde">Abrir Puerta Portal</button>
    </div>
  </div>

  <div class="panel apto">
    <div class="titulo-panel">Puerta Apartamento</div>
    <div class="estadoPuerta" id="estadoApto"></div>
    <div class="botones">
      <button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
    </div>
  </div>

  <div class="panel luces" id="panelLuces" style="display:none;">
    <div class="titulo-panel">Luces</div>
    <div class="botones" id="botonesLuces"></div>
  </div>
</div>

<div id="popupConfig">
  <h3>Configuración de Tiempos</h3>
  <div id="configBotones" style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;"></div>
  <button id="cerrarPopup" style="margin-top:1rem; padding:0.5rem 1rem; font-size:1.5rem; background:#555; color:white; border-radius:8px;">Cerrar</button>
</div>

<script>

// -------- FUNCIONES BASE64 --------
function base64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length % 4) str += '=';
  return decodeURIComponent(atob(str));
}

// -------- EXTRAER PARÁMETROS URL --------
const params = new URLSearchParams(window.location.search);
const d = params.get('d') || '';
let decoded = {};
try {
  const paramStr = base64urlDecode(d);
  paramStr.split('&').forEach(p => {
    const [key,val] = p.split('=');
    decoded[key] = val || '';
  });
} catch(e){
  console.error("Error decodificando link:", e);
}

// -------- PARÁMETROS --------
const k   = decoded['k'];
const ia  = decoded['ia'];
const a   = decoded['a'];
const ct  = decoded['ct'];
const fa  = decoded['fa'];
const fe  = decoded['fe'];
const he  = decoded['he'];
const fs  = decoded['fs'];
const hs  = decoded['hs'];
const cp  = decoded['cp'] === '1';
const ca  = decoded['ca'] === '1';
const l   = parseInt(decoded['l']) || 0;
const m1  = decoded['m1'] || '';
const m2  = decoded['m2'] || '';
let m3   = decoded['m3'] ? `wss://${decoded['m3']}.s1.eu.hivemq.cloud:8884/mqtt` : '';

// -------- MQTT --------
const client = mqtt.connect(m3,{username: m1,password: m2,connectTimeout:3000});
client.on('connect', ()=>console.log("✅ Conectado a HiveMQ Cloud"));
client.on('error', err=>console.log("❌ Error MQTT:",err));

function enviarMQTT(topic, accion){
  if(!ct) return;
  const ahora = new Date();
  const fechaHoraEnvio = ahora.toISOString();
  if(!topic.startsWith(ct)) topic = `${ct}${ct.endsWith('/')||topic.startsWith('/')?'':'/'}${topic}`;
  
  let duracion_rele = 0;
  if(topic.includes('/portal')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrir')) || 3;
  else if(topic.includes('/apto')) duracion_rele = parseInt(localStorage.getItem('tiempo_abrirApto')) || 3;
  else if(topic.includes('/luz')) duracion_rele = parseInt(localStorage.getItem('tiempo_' + topic.match(/luz(\d+)/)[1])) || 36000;

  const mensaje = {
    id: ahora.getTime(),
    fechaHoraEnvio,
    accion,
    clave: k,
    ct, apartamento: a,
    fechaAlta: fa, fechaEntrada: fe, horaEntrada: he,
    fechaFin: fs, horaFin: hs,
    cp_portal: +cp, ca_apto: +ca,
    l_luz: l, duracion_rele
  };

  client.publish(topic, JSON.stringify(mensaje), {qos:1}, err=>err && console.log("❌ Error al publicar:",err));
}

// -------- ELEMENTOS --------
const btnAbrir = document.getElementById('abrir');
const btnAbrirApto = document.getElementById('abrirApto');
const estadoPortal = document.getElementById('estadoPortal');
const estadoApto = document.getElementById('estadoApto');
const estadoApartamento = document.getElementById('estadoApartamento');
const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');
let botonesLuz = [];

function formatearFechaHora(f,h){
  return {
    fecha: f?`${f.slice(0,4)}-${f.slice(4,6)}-${f.slice(6,8)}`:'-',
    hora: h?`${h.slice(0,2)}:${h.slice(2,4)}`:'-'
  };
}

const inicio = formatearFechaHora(fe,he);
const fin = formatearFechaHora(fs,hs);
document.getElementById('apartamento').textContent = a;
document.getElementById('fechaInicio').textContent = inicio.fecha;
document.getElementById('horaInicio').textContent = inicio.hora;
document.getElementById('fechaFin').textContent = fin.fecha;
document.getElementById('horaFin').textContent = fin.hora;

// -------- BOTONES LUCES --------
if(l>0){
  panelLuces.style.display='block';
  for(let i=1;i<=l;i++){
    const btn = document.createElement('button');
    btn.dataset.index=i;
    btn.classList.add('verde');
    btn.textContent=`Encender\nLuz ${i}`;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);

    btn.addEventListener('click', ()=>{
      if(btn.disabled) return;
      if(btn.classList.contains('verde')){
        btn.classList.replace('verde','amarillo');
        btn.textContent=`Apagar\nLuz ${i}`;
        enviarMQTT(`/luz${i}`,'ON');
      }else{
        btn.classList.replace('amarillo','verde');
        btn.textContent=`Encender\nLuz ${i}`;
        enviarMQTT(`/luz${i}`,'OFF');
      }
    });
  }
}

// -------- VALIDACIÓN ACCESO --------
function validarAcceso(){
  const ahora = new Date();
  const acceso = ahora >= new Date(`${inicio.fecha}T${inicio.hora}:00`) && ahora <= new Date(`${fin.fecha}T${fin.hora}:00`);
  const aptoActivo = acceso && ca;
  const portalActivo = acceso && cp;

  btnAbrir.disabled = !portalActivo;
  btnAbrir.classList.toggle('gris', !portalActivo);
  btnAbrirApto.disabled = !aptoActivo;
  btnAbrirApto.classList.toggle('gris', !aptoActivo);

  estadoPortal.textContent = portalActivo?'ACTIVO':'INACTIVO';
  estadoPortal.style.color = portalActivo?'#0b7a2a':'#b30000';
  estadoApto.textContent = aptoActivo?'ACTIVO':'INACTIVO';
  estadoApto.style.color = aptoActivo?'#0b7a2a':'#b30000';
  estadoApartamento.textContent = acceso?'Activo':'Fuera de horario';
  estadoApartamento.style.color = acceso?'#0b7a2a':'#b30000';

  botonesLuz.forEach((b,i)=>{
    b.disabled = !aptoActivo;
    if(!aptoActivo){ b.classList.remove('verde','amarillo'); b.classList.add('gris'); b.textContent=`Encender\nLuz ${i+1}`; }
  });
}
validarAcceso();
setInterval(validarAcceso,60000);

// -------- EVENTOS --------
btnAbrir.addEventListener('click', ()=>{
  if(btnAbrir.disabled) return;
  const tiempo = parseInt(localStorage.getItem('tiempo_abrir')) || 3;
  btnAbrir.classList.replace('verde','amarillo');
  btnAbrir.textContent="Empuje la Puerta";
  enviarMQTT('/portal','ON');
  setTimeout(()=>{ if(!btnAbrir.disabled){ btnAbrir.classList.replace('amarillo','verde'); btnAbrir.textContent="Abrir Puerta Portal"; } }, tiempo*1000);
});

btnAbrirApto.addEventListener('click', ()=>{
  if(btnAbrirApto.disabled) return;
  const tiempo = parseInt(localStorage.getItem('tiempo_abrirApto')) || 3;
  btnAbrirApto.classList.replace('verde','amarillo');
  btnAbrirApto.textContent="Empuje la Puerta";
  enviarMQTT('/apto','ON');
  setTimeout(()=>{ if(!btnAbrirApto.disabled){ btnAbrirApto.classList.replace('amarillo','verde'); btnAbrirApto.textContent="Abrir Puerta Apartamento"; } }, tiempo*1000);
});

// -------- POP-UP CONFIGURACIÓN --------
const tituloPrincipal = document.getElementById('tituloPrincipal');
const popupConfig = document.getElementById('popupConfig');
const configBotones = document.getElementById('configBotones');
const cerrarPopup = document.getElementById('cerrarPopup');
let pulsacionTimer;

function iniciarPulsacion(){ pulsacionTimer=setTimeout(mostrarPopupConfig,5000); }
function cancelarPulsacion(){ clearTimeout(pulsacionTimer); }

['mousedown','touchstart'].forEach(e=>tituloPrincipal.addEventListener(e,iniciarPulsacion));
['mouseup','mouseleave','touchend','touchcancel'].forEach(e=>tituloPrincipal.addEventListener(e,cancelarPulsacion));

function mostrarPopupConfig(){
  popupConfig.style.display='block';
  configBotones.innerHTML='';
  const todosBotones = [
    {id:'abrir', nombre:'Puerta Portal', tipo:'portal'},
    {id:'abrirApto', nombre:'Puerta Apartamento', tipo:'apto'},
    ...botonesLuz.map(b=>({id:b.dataset.index, nombre:`Luz ${b.dataset.index}`, tipo:'luz'}))
  ];
  const valoresPortalApto = [1,2,3,4];
  const valoresLuces = [1,5,15,30,45,60,120,180,240,300,360,420,480,540,600,'Continuo'];

  todosBotones.forEach(boton=>{
    const div = document.createElement('div');
    div.style.display='flex';
    div.style.alignItems='center';
    const label = document.createElement('span');
    label.textContent = boton.nombre;
    label.style.width='200px';
    const select = document.createElement('select');
    select.dataset.botonId = boton.id;
    const opciones = (boton.tipo==='portal'||boton.tipo==='apto') ? valoresPortalApto : valoresLuces;
    opciones.forEach(v=>{
      const opt = document.createElement('option');
      opt.value = (v==='Continuo') ? 999999 : v;
      if(boton.tipo==='portal'||boton.tipo==='apto') opt.textContent = v+' segundos';
      else if(v==='Continuo') opt.textContent='Continuo';
      else if(v<60) opt.textContent=v+' minutos';
      else opt.textContent = `${v/60} Horas`;
      select.appendChild(opt);
    });
    const valorGuardado = localStorage.getItem('tiempo_'+boton.id);
    if(valorGuardado) select.value = valorGuardado;
    select.addEventListener('change', ()=>localStorage.setItem('tiempo_'+boton.id, select.value));
    div.appendChild(label);
    div.appendChild(select);
    configBotones.appendChild(div);
  });
}

cerrarPopup.addEventListener('click', ()=> popupConfig.style.display='none');

</script>
</body>
</html>
