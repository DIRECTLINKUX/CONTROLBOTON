<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apertura de Puertas</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#d6d6d6,#bfbfbf);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin:0;
  padding-top:20px;
}
.cuadro{
  background:white;
  padding:3rem;
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
  text-align:center;
  width:98%;
  max-width:750px;
}
h2{ font-size:4.5rem; margin-bottom:1rem; }
.fecha-hora{
  display:flex;
  font-size:2.5rem;
  margin-bottom:1rem;
  justify-content:center;
  gap:1rem;
}
.fecha-hora-combinada{
  display:grid;
  grid-template-columns: 140px 220px 120px;
  row-gap:0.5rem;
  font-size:2.5rem;
}
.panel{
  border-radius:15px;
  padding:1.5rem;
  margin-bottom:2rem;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.panel.portal{ background:#e3f5ea; border:3px solid #145c2c; }
.panel.apto{ background:#e8edff; border:3px solid #1a3f9e; }
.panel.luces{ background:#fff3e6; border:3px solid #b36000; }
.estadoPuerta{
  font-weight:bold;
  font-size:1.8rem;
  margin-bottom:1rem;
}
.botones{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:1rem;
  margin-top:1rem;
}

/* -------- BOTONES GENERALES -------- */
button{
  padding:1rem 0.5rem;
  font-size:1.6rem;
  border-radius:15px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.3s;
  white-space: nowrap;  
  text-align: center;    
}
.verde{ background:linear-gradient(to bottom,#1f7a3a,#0f4f23); }
.amarillo{ background:#f2c200 !important; color:black; }
.gris{ background:#999 !important; color:#555 !important; cursor:not-allowed; }

/* -------- SOLO BOTONES DE LUCES (TAMAÑO FIJO, TEXTO AJUSTABLE) -------- */
#botonesLuces button {
  width:180px;
  min-width:180px;
  max-width:180px;
  height:60px;
  min-height:60px;
  max-height:60px;

  display:flex;
  align-items:center;       /* centra verticalmente */
  justify-content:center;   /* centra horizontalmente */

  padding:0 0.5rem;         /* espacio interno lateral */
  overflow:hidden;          /* evita que el texto salga del botón */
  text-overflow:ellipsis;   /* pone "..." si es muy largo */
}
</style>
</head>
<body>
<div class="cuadro">
<h2>Apertura de Puertas</h2>
<div class="fecha-hora">
Apartamento:
<span id="apartamento"></span>
<span id="estadoApartamento" style="font-weight:bold;"></span>
</div>
<div class="fecha-hora fecha-hora-combinada">
<span>Inicio:</span>
<span id="fechaInicio"></span>
<span id="horaInicio"></span>
<span>Fin:</span>
<span id="fechaFin"></span>
<span id="horaFin"></span>
</div>
<div class="panel portal">
<div style="font-size:2.5rem;font-weight:bold;">Puerta Portal</div>
<div class="estadoPuerta" id="estadoPortal"></div>
<div class="botones">
<button id="abrir" class="verde">Abrir Puerta Portal</button>
</div>
</div>
<div class="panel apto">
<div style="font-size:2.5rem;font-weight:bold;">Puerta Apartamento</div>
<div class="estadoPuerta" id="estadoApto"></div>
<div class="botones">
<button id="abrirApto" class="verde">Abrir Puerta Apartamento</button>
</div>
</div>
<div class="panel luces" id="panelLuces" style="display:none;">
<div style="font-size:2.5rem;font-weight:bold;">Luces</div>
<div class="botones" id="botonesLuces"></div>
</div>
</div>

<script>
// -------- MQTT --------
const broker = 'wss://broker.hivemq.com:8884/mqtt';
const client = mqtt.connect(broker);

function enviarMQTT(topic, accion){
  const mensaje = { id: Date.now(), accion: accion };
  client.publish(topic, JSON.stringify(mensaje), {qos:1});
}

// -------- PARÁMETROS --------
const params = new URLSearchParams(window.location.search);
const fe = params.get('fe');
const he = params.get('he');
const fs = params.get('fs');
const hs = params.get('hs');
const a = Math.min(Math.max(parseInt(params.get('a')),1),100) || 1;
const cp = params.get('cp')==='1';
const ca = params.get('ca')==='1';
const l = parseInt(params.get('l'))||0;

// -------- ELEMENTOS --------
const btnAbrir = document.getElementById('abrir');
const btnAbrirApto = document.getElementById('abrirApto');
const estadoPortal = document.getElementById('estadoPortal');
const estadoApto = document.getElementById('estadoApto');
const estadoApartamento = document.getElementById('estadoApartamento');
const panelLuces = document.getElementById('panelLuces');
const botonesLuces = document.getElementById('botonesLuces');

let botonesLuz = [];

// -------- FORMATEO FECHA --------
function formatearFechaHora(f,h){
  return {
    fecha: f.slice(0,4)+'-'+f.slice(4,6)+'-'+f.slice(6,8),
    hora: h.slice(0,2)+':'+h.slice(2,4)
  };
}

const inicio = formatearFechaHora(fe, he);
const fin = formatearFechaHora(fs, hs);

document.getElementById('apartamento').textContent = a;
document.getElementById('fechaInicio').textContent = inicio.fecha;
document.getElementById('horaInicio').textContent = inicio.hora;
document.getElementById('fechaFin').textContent = fin.fecha;
document.getElementById('horaFin').textContent = fin.hora;

// -------- CREAR BOTONES LUCES --------
if(l>0){
  panelLuces.style.display='block';
  for(let i=1;i<=l;i++){
    const btn = document.createElement('button');
    btn.dataset.index = i;
    btn.classList.add('verde');
    btn.textContent = `Encender Luz ${i}`;
    botonesLuces.appendChild(btn);
    botonesLuz.push(btn);

    btn.addEventListener('click', ()=>{
      if(btn.disabled) return;

      if(btn.classList.contains('verde')){
        btn.classList.remove('verde');
        btn.classList.add('amarillo');
        btn.textContent = `Apagar Luz ${i}`;
        enviarMQTT(`apartamento${a}/luz${i}`, 'on');
      } else {
        btn.classList.remove('amarillo');
        btn.classList.add('verde');
        btn.textContent = `Encender Luz ${i}`;
        enviarMQTT(`apartamento${a}/luz${i}`, 'off');
      }
    });
  }
}

// -------- INICIALIZAR ESTADO LUCES AL INICIO --------
client.on('connect', ()=>{
  const ahora = new Date();
  const fIni = new Date(`${inicio.fecha}T${inicio.hora}:00`);
  const fFin = new Date(`${fin.fecha}T${fin.hora}:00`);
  const acceso = (ahora >= fIni && ahora <= fFin);

  if(!acceso) return;

  botonesLuz.forEach((btn,index)=>{
    const topic = `apartamento${a}/luz${index+1}`;
    client.subscribe(topic, {qos:1});

    client.once('message', (t, message)=>{
      if(t !== topic) return;
      const estado = message.toString();
      if(estado === 'on'){
        btn.classList.remove('verde');
        btn.classList.add('amarillo');
        btn.textContent = `Apagar Luz ${index+1}`;
      } else {
        btn.classList.remove('amarillo');
        btn.classList.add('verde');
        btn.textContent = `Encender Luz ${index+1}`;
      }
    });

    enviarMQTT(topic, 'get');
  });
});

// -------- VALIDACIÓN ACCESO --------
function validarAcceso(){
  const ahora = new Date();
  const fIni = new Date(`${inicio.fecha}T${inicio.hora}:00`);
  const fFin = new Date(`${fin.fecha}T${fin.hora}:00`);
  const acceso = (ahora>=fIni && ahora<=fFin);
  const aptoActivo = acceso && ca;
  const portalActivo = acceso && cp;

  btnAbrir.disabled = !portalActivo;
  btnAbrir.classList.toggle('gris', !portalActivo);
  btnAbrir.textContent = btnAbrir.classList.contains('amarillo') ? "Empuje la Puerta" : "Abrir Puerta Portal";

  btnAbrirApto.disabled = !aptoActivo;
  btnAbrirApto.classList.toggle('gris', !aptoActivo);
  btnAbrirApto.textContent = btnAbrirApto.classList.contains('amarillo') ? "Empuje la Puerta" : "Abrir Puerta Apartamento";

  botonesLuz.forEach((b,index)=>{
    b.disabled = !aptoActivo;
    if(!aptoActivo){
      b.classList.remove('verde','amarillo');
      b.classList.add('gris');
      b.textContent = `Encender Luz ${index+1}`;
    }
  });

  estadoPortal.textContent = portalActivo ? 'ACTIVO' : 'INACTIVO';
  estadoPortal.style.color = portalActivo ? '#0b7a2a' : '#b30000';

  estadoApto.textContent = aptoActivo ? 'ACTIVO' : 'INACTIVO';
  estadoApto.style.color = aptoActivo ? '#0b7a2a' : '#b30000';

  estadoApartamento.textContent = acceso ? 'Activo' : 'Fuera de horario';
  estadoApartamento.style.color = acceso ? '#0b7a2a' : '#b30000';
}

setInterval(validarAcceso, 60000);
validarAcceso();

// -------- EVENTOS PORTAL/APTO --------
btnAbrir.addEventListener('click', ()=>{
  if(btnAbrir.disabled) return;

  btnAbrir.classList.remove('verde');
  btnAbrir.classList.add('amarillo');
  btnAbrir.textContent = "Empuje la Puerta";
  enviarMQTT(`apartamento${a}/portal`,'abrir');

  setTimeout(()=>{
    if(!btnAbrir.disabled){
      btnAbrir.classList.remove('amarillo');
      btnAbrir.classList.add('verde');
      btnAbrir.textContent = "Abrir Puerta Portal";
    }
  },3000);
});

btnAbrirApto.addEventListener('click', ()=>{
  if(btnAbrirApto.disabled) return;

  btnAbrirApto.classList.remove('verde');
  btnAbrirApto.classList.add('amarillo');
  btnAbrirApto.textContent = "Empuje la Puerta";
  enviarMQTT(`apartamento${a}/apto`,'abrir');

  setTimeout(()=>{
    if(!btnAbrirApto.disabled){
      btnAbrirApto.classList.remove('amarillo');
      btnAbrirApto.classList.add('verde');
      btnAbrirApto.textContent = "Abrir Puerta Apartamento";
    }
  },3000);
});
</script>
</body>
</html>
